<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>과제 운영 뷰 — Legend Team</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .command-card {
      border-radius: 12px; padding: 18px 20px 16px;
      display: flex; flex-direction: column; gap: 6px;
      border-top: 3px solid var(--cc-color, #333);
      position: relative; overflow: hidden;
    }
    .command-card::before {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient(220px 100px at 50% -20%, var(--cc-glow, transparent), transparent 65%);
      pointer-events: none;
    }
    .command-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--cc-color, #888); font-weight: 600; }
    .command-value { font-size: 48px; font-weight: 800; letter-spacing: -2px; color: var(--text); line-height: 1; margin: 4px 0; }
    .command-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; padding: 3px 10px; border-radius: 20px; margin-top: 2px;
      width: fit-content; font-weight: 600; letter-spacing: .5px;
    }
    .badge-alarm { background: rgba(239,68,68,.15); color: #F87171; border: 1px solid rgba(239,68,68,.3); }
    .badge-ok { background: rgba(16,185,129,.12); color: #34D399; border: 1px solid rgba(16,185,129,.25); }
    .badge-warn { background: rgba(245,158,11,.12); color: #FCD34D; border: 1px solid rgba(245,158,11,.25); }

    .pipeline-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
    .pipeline-item {
      display: grid; grid-template-columns: 80px 1fr auto auto;
      align-items: center; gap: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 16px; font-size: 12px;
    }
    .pipeline-type {
      font-size: 10px; color: var(--text-secondary);
      background: var(--surface-2); border-radius: 4px; padding: 2px 6px; text-align: center;
    }
    .pipeline-title { color: var(--text); font-weight: 500; }
    .pipeline-status { font-size: 10px; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
    .status-in-progress { background: var(--status-progress-bg); color: var(--status-progress); }
    .status-suspended { background: #1a0a2a; color: #9b59b6; }
    .status-closed { background: var(--status-closed-bg); color: var(--status-closed); }
    .status-completed { background: #0a1a2a; color: #3b6fd4; }
    .pipeline-session { font-size: 10px; color: var(--text-tertiary); white-space: nowrap; }

    .session-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .session-table th {
      text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border);
      font-size: 10px; color: var(--text-secondary); font-weight: 600; letter-spacing: 0.05em;
    }
    .session-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
    .session-table tr:hover td { background: var(--surface-2); }
    .session-table .td-id { color: var(--accent-blue); font-family: monospace; }
    .session-table .td-dec { color: var(--accent-gold); }

    .deferral-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
    .deferral-item {
      display: flex; align-items: flex-start; gap: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px; font-size: 12px;
    }
    .deferral-id { font-family: monospace; font-size: 10px; color: var(--accent-blue); min-width: 48px; }
    .deferral-content { flex: 1; color: var(--text); line-height: 1.5; }
    .deferral-status { font-size: 10px; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
    .status-pending { background: #2a2000; color: var(--accent-gold); }
    .status-resolved { background: #0a2a0a; color: var(--accent-green); }

    .decision-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .decision-table th {
      text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border);
      font-size: 10px; color: var(--text-secondary); font-weight: 600;
    }
    .decision-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
    .decision-table .td-id { font-family: monospace; color: var(--accent-blue); }
    .decision-table .td-axis { color: var(--text-secondary); font-size: 11px; }

    .empty-state { color: var(--text-tertiary); font-style: italic; padding: 16px; font-size: 12px; }
  </style>
</head>
<style>
.app{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.sidebar{background:var(--panel);border-right:1px solid var(--line);padding:24px 16px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:4px;overflow-y:auto}
.brand{display:flex;align-items:center;gap:10px;padding:4px 8px 20px 8px;border-bottom:1px solid var(--line);margin-bottom:12px}
.brand-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#4F46E5,#9333EA);display:grid;place-items:center;font-weight:800;font-size:13px;color:#fff;flex-shrink:0}
.brand-name{font-size:15px;font-weight:700;letter-spacing:-.2px}
.brand-tag{font-size:9px;color:var(--text-3);text-transform:uppercase;letter-spacing:.14em;margin-top:2px}
.nav-group{font-size:9px;color:var(--text-3);text-transform:uppercase;letter-spacing:.14em;padding:14px 10px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;color:var(--text-2);font-size:13px;transition:all .15s;text-decoration:none}
.nav-item:hover{background:var(--panel-2);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,rgba(139,92,246,.18),rgba(6,182,212,.12));color:#fff;box-shadow:inset 0 0 0 1px rgba(139,92,246,.3)}
.nav-dot{width:6px;height:6px;border-radius:2px;flex-shrink:0}
.sidebar-foot{margin-top:auto;padding:12px 10px;border-top:1px solid var(--line);font-size:11px;color:var(--text-3)}
.sidebar-foot b{color:var(--text-2)}
.s-main{padding:28px 36px 64px;min-width:0;overflow-x:hidden}
.s-topbar{margin-bottom:24px}
.s-crumb{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.14em}
.s-h1{font-size:28px;font-weight:800;letter-spacing:-.6px;margin-top:4px;color:var(--text)}
</style>
<body>
<a href="#main-content" class="skip-link">본문으로 건너뛰기</a>
<div class="app">
<!-- @partial:sidebar -->
<main class="s-main" id="main-content">
  <div class="s-topbar">
    <div class="s-crumb">Dashboard / Ops</div>
    <div class="s-h1">Ops Dashboard</div>
  </div>
  <div class="page" style="padding:0;max-width:none;margin:0">
    <!-- O1: Command Center -->
    <div class="section-title" style="margin-bottom:12px">O1 — Command Center</div>
    <div class="section-grid" id="commandGrid">
      <div class="command-card"><div class="command-label">로딩 중...</div></div>
    </div>

    <!-- O2: Pipeline -->
    <div class="section-title" style="margin-bottom:12px">O2 — Pipeline</div>
    <div class="pipeline-list" id="pipelineList">
      <div class="empty-state">로딩 중...</div>
    </div>

    <!-- O3: Recent Sessions -->
    <div class="section-title" style="margin-bottom:12px">O3 — Recent Sessions</div>
    <table class="session-table">
      <thead>
        <tr>
          <th>SESSION</th>
          <th>TOPIC</th>
          <th>STARTED</th>
          <th>DECISIONS</th>
          <th>SIZE</th>
          <th>QUALITY</th>
        </tr>
      </thead>
      <tbody id="sessionTable"></tbody>
    </table>

    <!-- O4: Pending Deferrals -->
    <div class="section-title" style="margin-bottom:12px; margin-top:24px">O4 — Pending Deferrals</div>
    <div class="deferral-list" id="deferralList">
      <div class="empty-state">로딩 중...</div>
    </div>

    <!-- O5: Recent Decisions -->
    <div class="section-title" style="margin-bottom:12px; margin-top:24px">O5 — Recent Decisions</div>
    <table class="decision-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>DATE</th>
          <th>AXIS</th>
          <th>STATUS</th>
        </tr>
      </thead>
      <tbody id="decisionTable"></tbody>
    </table>
  </div>

  <script src="js/data-loader.js"></script>
  <script>
    async function init() {
      const [dashData, systemState, topicIndex, decisionLedger] = await Promise.all([
        DataLoader.fetchJSON('memory/shared/dashboard_data.json'),
        DataLoader.fetchJSON('memory/shared/system_state.json'),
        DataLoader.fetchJSON('memory/shared/topic_index.json'),
        DataLoader.fetchJSON('memory/shared/decision_ledger.json'),
      ]);

      renderCommand(dashData, systemState, topicIndex);
      renderPipeline(topicIndex, systemState);
      renderDeferrals(systemState);
      renderSessions(dashData);
      renderDecisions(decisionLedger);
    }

    function renderCommand(dash, sys, topics) {
      const alarms = dash?.alarms ?? [];
      const openTopics = (topics?.topics ?? []).filter(t =>
        t.status === 'in-progress' || t.status === 'suspended'
      );
      const pendingDef = (sys?.pendingDeferrals ?? []).filter(d => d.status === 'pending');
      const totalDec = dash?.metrics?.totalDecisions ?? 0;

      const cards = [
        {
          label: 'Alarms', value: alarms.length,
          color: '#EF4444', glow: 'rgba(239,68,68,.18)',
          bg: 'linear-gradient(145deg,rgba(239,68,68,.12) 0%,rgba(239,68,68,.03) 50%,#0B0B0D 100%)',
          border: 'rgba(239,68,68,.35)',
          badge: alarms.length > 0 ? { text: `${alarms.length} active`, cls: 'badge-alarm' } : { text: 'All Clear', cls: 'badge-ok' }
        },
        {
          label: 'Open Topics', value: openTopics.length,
          color: '#F59E0B', glow: 'rgba(245,158,11,.18)',
          bg: 'linear-gradient(145deg,rgba(245,158,11,.12) 0%,rgba(245,158,11,.03) 50%,#0B0B0D 100%)',
          border: 'rgba(245,158,11,.35)',
          badge: openTopics.length > 0 ? { text: openTopics.map(t => t.id).join(', '), cls: 'badge-warn' } : { text: 'None', cls: 'badge-ok' }
        },
        {
          label: 'Pending Deferrals', value: pendingDef.length,
          color: '#06B6D4', glow: 'rgba(6,182,212,.18)',
          bg: 'linear-gradient(145deg,rgba(6,182,212,.12) 0%,rgba(6,182,212,.03) 50%,#0B0B0D 100%)',
          border: 'rgba(6,182,212,.35)',
          badge: pendingDef.length > 0 ? { text: pendingDef.map(d => d.id).join(', '), cls: 'badge-warn' } : { text: 'None', cls: 'badge-ok' }
        },
        {
          label: 'Total Decisions', value: totalDec,
          color: '#10B981', glow: 'rgba(16,185,129,.18)',
          bg: 'linear-gradient(145deg,rgba(16,185,129,.12) 0%,rgba(16,185,129,.03) 50%,#0B0B0D 100%)',
          border: 'rgba(16,185,129,.35)',
          badge: { text: `D-001 ~ D-${String(totalDec).padStart(3,'0')}`, cls: 'badge-ok' }
        },
      ];

      document.getElementById('commandGrid').innerHTML = cards.map(c =>
        `<div class="command-card" style="--cc-color:${c.color};--cc-glow:${c.glow};background:${c.bg};border:1px solid ${c.border};border-top:3px solid ${c.color}">
          <div class="command-label">${c.label}</div>
          <div class="command-value">${c.value}</div>
          ${c.badge ? `<span class="command-badge ${c.badge.cls}">${c.badge.text}</span>` : ''}
        </div>`
      ).join('');
    }

    function statusClass(status) {
      if (status === 'in-progress') return 'status-in-progress';
      if (status === 'suspended') return 'status-suspended';
      if (status === 'completed') return 'status-completed';
      return 'status-closed';
    }

    function renderPipeline(topicIndex, sys) {
      const topics = topicIndex?.topics ?? [];
      const active = topics.filter(t =>
        t.status === 'in-progress' || t.status === 'suspended'
      );
      const recent = topics.filter(t =>
        t.status === 'completed' || t.status === 'closed'
      ).slice(-5).reverse();

      const items = [...active, ...recent].slice(0, 10);
      if (items.length === 0) {
        document.getElementById('pipelineList').innerHTML = '<div class="empty-state">No items</div>';
        return;
      }

      document.getElementById('pipelineList').innerHTML = items.map(t =>
        `<div class="pipeline-item">
          <span class="pipeline-type">${t.type ?? 'general'}</span>
          <span class="pipeline-title">${t.title}</span>
          <span class="pipeline-status ${statusClass(t.status)}">${t.status}</span>
          <span class="pipeline-session">${t.note?.match(/session_\d+/)?.[0] ?? t.id}</span>
        </div>`
      ).join('');
    }

    function renderDeferrals(sys) {
      const deferrals = (sys?.pendingDeferrals ?? []).filter(d => d.status === 'pending');
      if (deferrals.length === 0) {
        document.getElementById('deferralList').innerHTML = '<div class="empty-state">No deferrals</div>';
        return;
      }
      document.getElementById('deferralList').innerHTML = deferrals.map(d =>
        `<div class="deferral-item">
          <span class="deferral-id">${d.id}</span>
          <div class="deferral-content">
            <div>${d.item}</div>
            ${d.note ? `<div style="color:var(--text-tertiary);margin-top:4px;font-size:11px">${d.note}</div>` : ''}
          </div>
          <span class="deferral-status status-${d.status}">${d.status}</span>
        </div>`
      ).join('');
    }

    function renderSessions(dash) {
      const sessions = (dash?.sessions ?? []).slice().reverse().slice(0, 15);
      const tbody = document.getElementById('sessionTable');
      if (sessions.length === 0) { tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No data</td></tr>'; return; }

      tbody.innerHTML = sessions.map(s =>
        `<tr>
          <td class="td-id">${s.sessionId}</td>
          <td>${s.topic ?? s.topicSlug}</td>
          <td style="color:var(--text-tertiary)">${s.startedAt.slice(0,10)}</td>
          <td class="td-dec">${s.decisionCount > 0 ? '+' + s.decisionCount : '—'}</td>
          <td>${s.size}</td>
          <td style="color:${s.dataQuality === 'auto' ? 'var(--accent-blue)' : 'var(--text-tertiary)'}">${s.dataQuality}</td>
        </tr>`
      ).join('');
    }

    function renderDecisions(ledger) {
      const decisions = (ledger?.decisions ?? []).slice().reverse().slice(0, 10);
      const tbody = document.getElementById('decisionTable');
      if (decisions.length === 0) { tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No data</td></tr>'; return; }

      tbody.innerHTML = decisions.map(d =>
        `<tr>
          <td class="td-id">${d.id}</td>
          <td style="color:var(--text-tertiary)">${d.date}</td>
          <td class="td-axis">${d.axis}</td>
          <td><span style="font-size:10px;color:var(--accent-green)">${d.status}</span></td>
        </tr>`
      ).join('');
    }

    init();
  </script>
</div></main></div>
</body>
</html>
