<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>과제 운영 뷰 — Legend Team</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .command-card {
      border-radius: 12px; padding: 18px 20px 16px;
      display: flex; flex-direction: column; gap: 6px;
      border-top: 3px solid var(--cc-color, #333);
      position: relative; overflow: hidden;
    }
    .command-card::before {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient(220px 100px at 50% -20%, var(--cc-glow, transparent), transparent 65%);
      pointer-events: none;
    }
    .command-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--cc-color, #888); font-weight: 600; }
    .command-value { font-size: 48px; font-weight: 800; letter-spacing: -2px; color: var(--text); line-height: 1; margin: 4px 0; }
    .command-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; padding: 3px 10px; border-radius: 20px; margin-top: 2px;
      width: fit-content; font-weight: 600; letter-spacing: .5px;
    }
    .badge-alarm { background: rgba(239,68,68,.15); color: #F87171; border: 1px solid rgba(239,68,68,.3); }
    .badge-ok { background: rgba(16,185,129,.12); color: #34D399; border: 1px solid rgba(16,185,129,.25); }
    .badge-warn { background: rgba(245,158,11,.12); color: #FCD34D; border: 1px solid rgba(245,158,11,.25); }

    .pipeline-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
    .pipeline-item {
      display: grid; grid-template-columns: 80px 1fr auto auto;
      align-items: center; gap: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 16px; font-size: 12px;
    }
    .pipeline-type {
      font-size: 10px; color: var(--text-secondary);
      background: var(--surface-2); border-radius: 4px; padding: 2px 6px; text-align: center;
    }
    .pipeline-title { color: var(--text); font-weight: 500; }
    .pipeline-status { font-size: 10px; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
    .status-in-progress { background: var(--status-progress-bg); color: var(--status-progress); }
    .status-suspended { background: #1a0a2a; color: #9b59b6; }
    .status-closed { background: var(--status-closed-bg); color: var(--status-closed); }
    .status-completed { background: #0a1a2a; color: #3b6fd4; }
    .pipeline-session { font-size: 10px; color: var(--text-tertiary); white-space: nowrap; }

    .session-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .session-table th {
      text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border);
      font-size: 10px; color: var(--text-secondary); font-weight: 600; letter-spacing: 0.05em;
    }
    .session-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
    .session-table tr:hover td { background: var(--surface-2); }
    .session-table .td-id { color: var(--accent-blue); font-family: monospace; }
    .session-table .td-dec { color: var(--accent-gold); }

    .deferral-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
    .deferral-item {
      display: flex; align-items: flex-start; gap: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px; font-size: 12px;
    }
    .deferral-id { font-family: monospace; font-size: 10px; color: var(--accent-blue); min-width: 48px; }
    .deferral-content { flex: 1; color: var(--text); line-height: 1.5; }
    .deferral-status { font-size: 10px; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
    .status-pending { background: #2a2000; color: var(--accent-gold); }
    .status-resolved { background: #0a2a0a; color: var(--accent-green); }

    .decision-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .decision-table th {
      text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border);
      font-size: 10px; color: var(--text-secondary); font-weight: 600;
    }
    .decision-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
    .decision-table .td-id { font-family: monospace; color: var(--accent-blue); }
    .decision-table .td-axis { color: var(--text-secondary); font-size: 11px; }

    .empty-state { color: var(--text-tertiary); font-style: italic; padding: 16px; font-size: 12px; }
    .s-topbar { margin-bottom: 24px; }
  </style>
</head>
<body>
<a href="#main-content" class="skip-link">본문으로 건너뛰기</a>
<div class="app">
<!-- @partial:sidebar -->
<main class="s-main" id="main-content">
  <div class="s-topbar">
    <div class="s-crumb">Dashboard / Ops</div>
    <div class="s-h1">Ops Dashboard</div>
  </div>
  <div class="page" style="padding:0;max-width:none;margin:0">
    <!-- O1: System Health (운영 신호 5종) -->
    <div class="section-title" style="margin-bottom:12px">O1 — System Health</div>
    <div class="section-grid" id="commandGrid">
      <div class="command-card"><div class="command-label">로딩 중...</div></div>
    </div>

    <!-- O2: Suspended Topics (재개 후보) -->
    <div class="section-title" style="margin-bottom:12px;margin-top:24px">O2 — Suspended Topics <span style="color:var(--text-3);font-weight:400;text-transform:none;letter-spacing:0;font-size:11px">· 재개 후보</span></div>
    <div class="pipeline-list" id="suspendedList">
      <div class="empty-state">로딩 중...</div>
    </div>

    <!-- O3: Active Alarms -->
    <div class="section-title" style="margin-bottom:12px;margin-top:24px">O3 — Active Alarms</div>
    <div id="alarmList">
      <div class="alarm-none">로딩 중…</div>
    </div>

    <!-- O4: Recent Hook Events -->
    <div class="section-title" style="margin-bottom:12px;margin-top:24px">O4 — Recent Hook Events</div>
    <table class="decision-table">
      <thead>
        <tr>
          <th>TIME</th>
          <th>HOOK</th>
          <th>SESSION</th>
          <th>STATUS</th>
        </tr>
      </thead>
      <tbody id="hookTable"></tbody>
    </table>
  </div>

  <script src="js/nav.js"></script>
  <script src="js/data-loader.js"></script>
  <script>
    async function init() {
      const [dashData, systemState, topicIndex, evidenceIdx, tokenLog, hookLog, manifest] = await Promise.all([
        DataLoader.fetchJSON('memory/shared/dashboard_data.json'),
        DataLoader.fetchJSON('memory/shared/system_state.json'),
        DataLoader.fetchJSON('memory/shared/topic_index.json'),
        DataLoader.fetchJSON('memory/shared/evidence_index.json'),
        DataLoader.fetchJSON('memory/sessions/token_log.json'),
        DataLoader.fetchMD('logs/hook-diagnostics.log'),
        DataLoader.fetchJSON('published/topics_manifest.json'),
      ]);

      renderHealth(dashData, evidenceIdx, tokenLog, hookLog, manifest);
      renderSuspended(topicIndex);
      renderAlarms(dashData);
      renderHookEvents(hookLog);
    }

    // ── O1: System Health (5 KPI) ─────────────────────────────────
    function renderHealth(dash, evi, tokenLog, hookLog, manifest) {
      // 1) Build freshness
      const buildAt = manifest?.generatedAt ? new Date(manifest.generatedAt) : null;
      const ageMs = buildAt ? (Date.now() - buildAt.getTime()) : null;
      const ageStr = ageMs == null ? '—' : (ageMs < 3600e3 ? `${Math.round(ageMs/60e3)}분 전` : `${Math.round(ageMs/3600e3)}시간 전`);
      const stale = ageMs != null && ageMs > 24*3600e3;

      // 2) Hook success rate (recent 10 terminal events)
      // FIRED/FALLBACK/PD-016은 중간 상태 — OK/ERROR/ABORT만 터미널로 계산
      const lines = (hookLog || '').trim().split('\n').slice(-60);
      const hookEvents = parseHookLines(lines);
      const terminalStatuses = new Set(['OK', 'ERROR', 'ABORT']);
      const terminalEvents = hookEvents.filter(e => terminalStatuses.has(e.status));
      const recent10 = terminalEvents.slice(-10);
      const okCount = recent10.filter(e => e.status === 'OK').length;
      const hookRate = recent10.length ? Math.round(okCount/recent10.length*100) : 0;

      // 3) Open alarms
      const alarms = dash?.alarms ?? [];
      const redCount = alarms.filter(a => a.severity === 'red').length;
      const yellowCount = alarms.filter(a => a.severity === 'yellow').length;

      // 4) Open evidence
      const eviArr = Array.isArray(evi) ? evi : (evi?.entries || evi?.evidence || []);
      const openEvi = eviArr.filter(e => e.status === 'open').length;

      // 5) Avg cost / session (last 5)
      const last5 = (tokenLog?.entries ?? []).slice(-5);
      let totalTok = 0;
      last5.forEach(e => {
        const u = e.usage || {};
        totalTok += (u.input_tokens||0) + (u.output_tokens||0) + (u.cache_creation_input_tokens||0) + (u.cache_read_input_tokens||0);
      });
      const avgTok = last5.length ? Math.round(totalTok/last5.length) : 0;
      const avgTokStr = avgTok >= 1e6 ? (avgTok/1e6).toFixed(1)+'M' : (avgTok/1e3).toFixed(0)+'k';

      const cards = [
        {
          label: 'Hook Success', value: hookRate + '%',
          color: hookRate >= 90 ? '#10B981' : hookRate >= 70 ? '#F59E0B' : '#EF4444',
          glow: 'rgba(16,185,129,.18)',
          bg: 'linear-gradient(145deg,rgba(16,185,129,.10) 0%,rgba(0,0,0,.03) 50%,#0B0B0D 100%)',
          border: 'rgba(16,185,129,.30)',
          badge: { text: `${okCount}/${recent10.length} recent`, cls: hookRate >= 90 ? 'badge-ok' : 'badge-warn' }
        },
        {
          label: 'Open Alarms', value: alarms.length,
          color: redCount ? '#EF4444' : (yellowCount ? '#F59E0B' : '#10B981'),
          glow: redCount ? 'rgba(239,68,68,.18)' : 'rgba(245,158,11,.18)',
          bg: 'linear-gradient(145deg,rgba(239,68,68,.10) 0%,rgba(0,0,0,.03) 50%,#0B0B0D 100%)',
          border: redCount ? 'rgba(239,68,68,.35)' : (yellowCount ? 'rgba(245,158,11,.35)' : 'rgba(16,185,129,.30)'),
          badge: alarms.length ? { text: `${redCount}🔴 ${yellowCount}🟡`, cls: redCount ? 'badge-alarm' : 'badge-warn' } : { text: 'All Clear', cls: 'badge-ok' }
        },
        {
          label: 'Open Evidence', value: openEvi,
          color: '#06B6D4', glow: 'rgba(6,182,212,.18)',
          bg: 'linear-gradient(145deg,rgba(6,182,212,.10) 0%,rgba(0,0,0,.03) 50%,#0B0B0D 100%)',
          border: 'rgba(6,182,212,.30)',
          badge: { text: `of ${eviArr.length} total`, cls: 'badge-ok' }
        },
        {
          label: 'Avg Cost / Session', value: avgTokStr,
          color: '#A78BFA', glow: 'rgba(167,139,250,.18)',
          bg: 'linear-gradient(145deg,rgba(167,139,250,.10) 0%,rgba(0,0,0,.03) 50%,#0B0B0D 100%)',
          border: 'rgba(167,139,250,.30)',
          badge: { text: `last ${last5.length}`, cls: 'badge-ok' }
        },
      ];

      document.getElementById('commandGrid').innerHTML = cards.map(c =>
        `<div class="command-card" style="--cc-color:${c.color};--cc-glow:${c.glow};background:${c.bg};border:1px solid ${c.border};border-top:3px solid ${c.color}">
          <div class="command-label">${c.label}</div>
          <div class="command-value">${c.value}</div>
          ${c.badge ? `<span class="command-badge ${c.badge.cls}">${c.badge.text}</span>` : ''}
        </div>`
      ).join('');
    }

    // ── O2: Suspended Topics ──────────────────────────────────────
    function renderSuspended(topicIndex) {
      const topics = topicIndex?.topics ?? [];
      const suspended = topics.filter(t => t.status === 'suspended');
      const list = document.getElementById('suspendedList');
      if (suspended.length === 0) {
        list.innerHTML = '<div class="empty-state">No suspended topics</div>';
        return;
      }
      list.innerHTML = suspended.map(t =>
        `<a class="pipeline-item" href="topic.html?id=${t.id}" style="text-decoration:none;color:inherit">
          <span class="pipeline-type">${t.type ?? 'general'}</span>
          <span class="pipeline-title">${t.title}</span>
          <span class="pipeline-status status-suspended">suspended</span>
          <span class="pipeline-session">${t.id}${t.created?` · ${t.created}`:''}</span>
        </a>`
      ).join('');
    }

    // ── O3: Active Alarms ─────────────────────────────────────────
    function renderAlarms(dash) {
      const alarms = (dash?.alarms ?? []);
      const el = document.getElementById('alarmList');
      if (alarms.length === 0) {
        el.innerHTML = '<div class="alarm-none">경보 없음 ✅</div>';
        return;
      }
      el.innerHTML = alarms.slice(0, 10).map(a =>
        `<div class="alarm-item alarm-${a.severity||''}">
          <span style="color:${a.severity==='red'?'#EF4444':'#F59E0B'}">[${a.ruleId||''}]</span>
          <span>${a.sessionId?`<strong>${a.sessionId}</strong> — `:''}${a.description||''}</span>
        </div>`
      ).join('');
    }

    // ── O4: Recent Hook Events ────────────────────────────────────
    function parseHookLines(lines) {
      const events = [];
      for (const ln of lines) {
        // [2026-04-26T05:17:50.150Z] [hook-name] STATUS rest...
        const m = /^\[([^\]]+)\]\s*\[([^\]]+)\]\s*(\S+)\s*(.*)$/.exec(ln);
        if (!m) continue;
        const [, ts, hook, status, tail] = m;
        const sm = /legend=(session_\d+)/.exec(tail) || /(session_\d+)/.exec(tail);
        events.push({ ts, hook, status, session: sm ? sm[1] : '', raw: ln });
      }
      return events;
    }

    function renderHookEvents(hookLog) {
      const tbody = document.getElementById('hookTable');
      const allLines = (hookLog || '').trim().split('\n');
      const events = parseHookLines(allLines).slice(-10).reverse();
      if (events.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No hook events</td></tr>';
        return;
      }
      const sCol = { OK:'var(--accent-green)', FIRED:'var(--accent-blue)', FALLBACK:'#F59E0B', ABORT:'#EF4444', ERROR:'#EF4444' };
      tbody.innerHTML = events.map(e => {
        const t = new Date(e.ts);
        const tStr = isNaN(t) ? e.ts : t.toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
        return `<tr>
          <td style="color:var(--text-tertiary);font-size:11px">${tStr}</td>
          <td class="td-axis">${e.hook}</td>
          <td class="td-id">${e.session||'—'}</td>
          <td><span style="font-size:10px;color:${sCol[e.status]||'var(--text-tertiary)'}">${e.status}</span></td>
        </tr>`;
      }).join('');
    }


    init();
  </script>
</div></main></div>
</body>
</html>
