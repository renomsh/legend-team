<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deferrals — Legend Team</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
.s-meta{font-size:12px;color:var(--text-3);margin-bottom:18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.count-chip{display:inline-block;margin-left:10px;padding:3px 14px;font-size:14px;font-weight:700;color:#F59E0B;background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.35);border-radius:999px;vertical-align:middle}
.meta-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;font-size:11px;font-weight:500;border-radius:4px;border:1px solid var(--line);color:var(--text-2)}
.meta-pill.pending{color:#F59E0B;background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.25);font-weight:700}
.meta-pill.resolved{color:#10B981;background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.25)}
.meta-pill.deprecated{color:#6E6E78;background:rgba(110,110,120,.08)}

.list-toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px;padding:12px 14px;background:var(--panel);border:1px solid var(--line);border-radius:8px}
.list-search{flex:1;min-width:240px;padding:7px 12px;font-size:13px;background:var(--bg);border:1px solid var(--line);border-radius:6px;color:var(--text);outline:none}
.list-search:focus{border-color:#F59E0B}
.list-select{background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:7px 12px;color:var(--text-2);font-size:12px;outline:none;cursor:pointer;min-width:140px}

/* Action card — pending 기본 뷰 */
.pd-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;margin-bottom:10px;transition:border-color .12s;overflow:hidden}
.pd-card:hover{border-color:rgba(245,158,11,.4)}
.pd-card.target{border-color:#F59E0B;box-shadow:0 0 0 1px rgba(245,158,11,.3)}
.pd-card.s-pending{border-left:3px solid #F59E0B}
.pd-card.s-resolved{border-left:3px solid #10B981;opacity:.78}
.pd-card.s-deprecated{border-left:3px solid #6E6E78;opacity:.55}

.pd-head{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;flex-wrap:wrap}
.pd-id{font-family:'SF Mono',monospace;color:#F59E0B;font-weight:700;font-size:12px;min-width:62px;padding-top:2px;flex-shrink:0}
.pd-id.s-resolved{color:#34D399}
.pd-id.s-deprecated{color:var(--text-3)}
.pd-content{flex:1;min-width:240px;display:flex;flex-direction:column;gap:8px}
.pd-item{font-size:13px;color:var(--text);line-height:1.55}
.pd-resolve{font-size:12px;color:var(--text);background:rgba(245,158,11,.06);border-left:2px solid #F59E0B;padding:8px 12px;border-radius:0 6px 6px 0;line-height:1.55}
.pd-card.s-resolved .pd-resolve{background:rgba(16,185,129,.05);border-left-color:#10B981}
.pd-card.s-deprecated .pd-resolve{background:rgba(110,110,120,.05);border-left-color:#6E6E78}
.pd-resolve-label{font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--text-3);text-transform:uppercase;margin-bottom:3px}
.pd-side{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;min-width:80px}
.age-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px;letter-spacing:.04em;text-transform:uppercase;font-variant-numeric:tabular-nums}
.age-fresh{color:#10B981;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25)}
.age-warn{color:#F59E0B;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25)}
.age-stale{color:#EF4444;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3)}
.age-na{color:var(--text-3);background:transparent}

.pd-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:11px}
.pd-meta a, .pd-meta .pd-tag{padding:2px 8px;border-radius:4px;background:var(--panel-2);color:var(--text-2);text-decoration:none;border:1px solid var(--line);font-size:10px}
.pd-meta a:hover{color:var(--text);border-color:var(--text-3)}
.pd-meta .dep{color:#EF4444;background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);font-weight:600}
.pd-meta .dep:hover{color:#fff;background:#EF4444;border-color:#EF4444}
.pd-meta .status-tag{font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.pd-meta .status-tag.s-pending{color:#F59E0B;background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3)}
.pd-meta .status-tag.s-resolved{color:#10B981;background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.25)}
.pd-meta .status-tag.s-deprecated{color:#6E6E78}
.pd-resolved-note{font-size:11px;color:var(--text-3);font-style:italic;line-height:1.5;margin-top:4px}

.pager{display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding-top:14px;border-top:1px solid var(--line);flex-wrap:wrap;gap:10px}
.pager-info{font-size:12px;color:var(--text-3)}
.pager-ctrls{display:flex;gap:4px;align-items:center}
.pbtn{min-width:32px;padding:6px 10px;font-size:12px;color:var(--text-2);background:transparent;border:1px solid var(--line);border-radius:5px;cursor:pointer}
.pbtn:hover:not(.disabled):not(.active){color:var(--text);border-color:var(--text-3)}
.pbtn.active{color:#fff;background:#F59E0B;border-color:#F59E0B;font-weight:600}
.pbtn.disabled{opacity:.35;cursor:not-allowed}
.pdot{padding:0 4px;color:var(--text-3);font-size:12px}

/* Chart — collapsed at bottom */
.chart-details{margin-top:32px;padding:14px 16px;background:var(--panel);border:1px solid var(--line);border-radius:8px}
.chart-details summary{cursor:pointer;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-3);font-weight:600;list-style:none}
.chart-details summary::-webkit-details-marker{display:none}
.chart-details summary::before{content:'▶ ';font-size:10px;margin-right:6px;transition:transform .15s;display:inline-block}
.chart-details[open] summary::before{transform:rotate(90deg)}
#deferralGraph{width:100%;height:320px;overflow:hidden;margin-top:14px}
  </style>
</head>
<body>
<a href="#main-content" class="skip-link">본문으로 건너뛰기</a>
<div class="app">
<!-- @partial:sidebar -->
<main class="s-main" id="main-content">
  <div class="s-crumb">Records / Deferrals</div>
  <div class="s-h1">Action Queue <span class="count-chip" id="pdCount">…</span></div>
  <div class="s-meta" id="pdMeta"></div>

  <div class="list-toolbar">
    <input type="search" class="list-search" id="search" placeholder="Search PD id / item / resolve condition…" oninput="onSearch(this.value)">
    <select class="list-select" id="filterStatus" onchange="onStatusFilter(this.value)">
      <option value="pending">Pending only</option>
      <option value="all">All statuses</option>
      <option value="resolved">Resolved</option>
      <option value="deprecated">Deprecated</option>
    </select>
    <select class="list-select" id="sortBy" onchange="onSortChange(this.value)">
      <option value="oldest">Oldest first (action)</option>
      <option value="newest">Newest first</option>
      <option value="id">By ID</option>
    </select>
  </div>

  <div id="listWrap"><div class="loading">Loading deferrals</div></div>
  <div id="pager" class="pager"></div>

  <details class="chart-details">
    <summary>Timeline — 세션별 PD 누적 (분석)</summary>
    <div id="deferralGraph">
      <svg id="deferralSvg" width="100%" height="100%" role="img" aria-label="이연 항목 세션별 분포 시각화"></svg>
    </div>
  </details>
</main>
</div>

<script src="js/data-loader.js"></script>
<script src="js/nav.js"></script>
<script>
const PAGE_SIZE = 50;
let state = { all: [], sessionDates: {}, page: 1, search: '', status: 'pending', sort: 'oldest', target: null };

function escHtmlSafe(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function normalizeStatus(s) {
  if (!s) return 'pending';
  if (s === 'pending') return 'pending';
  if (s === 'deprecated') return 'deprecated';
  return 'resolved'; // resolved, resolved-*, etc
}
function ageDays(fromSession) {
  const date = state.sessionDates[fromSession];
  if (!date) return null;
  const then = new Date(date).getTime();
  const now = Date.now();
  if (isNaN(then)) return null;
  return Math.floor((now - then) / (1000 * 60 * 60 * 24));
}
function ageBadge(days, status) {
  if (days == null) return `<span class="age-badge age-na">—</span>`;
  if (status !== 'pending') return `<span class="age-badge age-na">${days}d</span>`;
  if (days >= 90) return `<span class="age-badge age-stale">${days}d stale</span>`;
  if (days >= 30) return `<span class="age-badge age-warn">${days}d</span>`;
  return `<span class="age-badge age-fresh">${days}d</span>`;
}

function applyFilters() {
  const q = state.search.toLowerCase();
  let list = state.all.filter(d => {
    const ns = normalizeStatus(d.status);
    if (state.status !== 'all' && ns !== state.status) return false;
    if (q) {
      const blob = `${d.id||''} ${d.item||''} ${d.resolveCondition||''} ${d.fromSession||''} ${d.fromTopic||''} ${d.note||''}`.toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });
  if (state.sort === 'oldest') {
    list = list.slice().sort((a, b) => (a.fromSession || '').localeCompare(b.fromSession || ''));
  } else if (state.sort === 'newest') {
    list = list.slice().sort((a, b) => (b.fromSession || '').localeCompare(a.fromSession || ''));
  } else if (state.sort === 'id') {
    list = list.slice().sort((a, b) => (a.id || '').localeCompare(b.id || ''));
  }
  return list;
}

function renderList() {
  const filtered = applyFilters();
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (state.target) {
    const idx = filtered.findIndex(d => d.id === state.target);
    if (idx >= 0) state.page = Math.floor(idx / PAGE_SIZE) + 1;
  }
  if (state.page > totalPages) state.page = totalPages;
  const start = (state.page - 1) * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);

  const wrap = document.getElementById('listWrap');
  if (!total) {
    wrap.innerHTML = '<div class="empty-state">No deferrals match the current filter</div>';
    document.getElementById('pager').innerHTML = '';
    return;
  }

  wrap.innerHTML = slice.map(d => {
    const ns = normalizeStatus(d.status);
    const isOpen = state.target === d.id;
    const days = ageDays(d.fromSession);
    const fromSessLink = d.fromSession ? `<a href="session.html?id=${d.fromSession}" onclick="event.stopPropagation()">${escHtmlSafe(d.fromSession)}</a>` : '';
    const fromTopic = d.fromTopic ? `<span class="pd-tag">${escHtmlSafe(d.fromTopic)}</span>` : '';
    const resolvedSess = d.resolvedInSession ? `<a href="session.html?id=${d.resolvedInSession}" onclick="event.stopPropagation()" style="color:#34D399">resolved in ${escHtmlSafe(d.resolvedInSession)}</a>` : '';
    const deprecatedSess = d.deprecatedInSession ? `<a href="session.html?id=${d.deprecatedInSession}" onclick="event.stopPropagation()" style="color:var(--text-3)">deprecated in ${escHtmlSafe(d.deprecatedInSession)}</a>` : '';
    const deps = (d.dependsOn || []).length > 0
      ? d.dependsOn.map(p => `<a class="dep" href="deferrals.html?id=${p}" onclick="event.stopPropagation()">depends: ${escHtmlSafe(p)}</a>`).join('')
      : '';
    const statusLabel = d.status || 'pending';

    return `<div class="pd-card s-${ns}${isOpen ? ' target' : ''}" data-id="${d.id}">
      <div class="pd-head">
        <span class="pd-id s-${ns}">${escHtmlSafe(d.id)}</span>
        <div class="pd-content">
          <div class="pd-item">${escHtmlSafe(d.item || '')}</div>
          ${d.resolveCondition ? `<div class="pd-resolve">
            <div class="pd-resolve-label">Resolve when</div>
            ${escHtmlSafe(d.resolveCondition)}
          </div>` : ''}
          ${d.resolvedNote ? `<div class="pd-resolved-note">↳ ${escHtmlSafe(d.resolvedNote)}</div>` : ''}
          ${d.deprecatedNote ? `<div class="pd-resolved-note">↳ ${escHtmlSafe(d.deprecatedNote)}</div>` : ''}
          <div class="pd-meta">
            <span class="status-tag s-${ns}">${escHtmlSafe(statusLabel)}</span>
            ${fromSessLink}
            ${fromTopic}
            ${resolvedSess}
            ${deprecatedSess}
            ${deps}
            <a href="deferrals.html?id=${d.id}" onclick="event.stopPropagation()" style="color:var(--text-3)">🔗</a>
          </div>
        </div>
        <div class="pd-side">${ageBadge(days, ns)}</div>
      </div>
    </div>`;
  }).join('');

  if (state.target) {
    const el = document.querySelector(`.pd-card[data-id="${state.target}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    state.target = null;
  }

  renderPager(total, totalPages, start, slice.length);
}

function renderPager(total, totalPages, start, sliceLen) {
  const pager = document.getElementById('pager');
  const startN = start + 1;
  const endN = start + sliceLen;
  const btn = (label, page, opts={}) => {
    const cls = ['pbtn'];
    if (opts.active) cls.push('active');
    if (opts.disabled) cls.push('disabled');
    const onclick = opts.disabled ? '' : `onclick="goToPage(${page})"`;
    return `<button class="${cls.join(' ')}" ${onclick}>${label}</button>`;
  };
  let pageBtns = '';
  const w = 2;
  for (let p = 1; p <= totalPages; p++) {
    if (p === 1 || p === totalPages || (p >= state.page - w && p <= state.page + w)) {
      pageBtns += btn(p, p, { active: p === state.page });
    } else if (p === state.page - w - 1 || p === state.page + w + 1) {
      pageBtns += '<span class="pdot">…</span>';
    }
  }
  pager.innerHTML = totalPages > 1 ? `<div class="pager-info">${startN}–${endN} of ${total}</div>
    <div class="pager-ctrls">${btn('‹ Prev', state.page-1, {disabled:state.page<=1})}${pageBtns}${btn('Next ›', state.page+1, {disabled:state.page>=totalPages})}</div>`
    : `<div class="pager-info">${total} item${total===1?'':'s'}</div>`;
}

function goToPage(p) { state.page = p; renderList(); window.scrollTo({top:0,behavior:'smooth'}); }
let _t;
function onSearch(v) { clearTimeout(_t); _t = setTimeout(() => { state.search = v; state.page = 1; renderList(); }, 150); }
function onStatusFilter(v) { state.status = v; state.page = 1; renderList(); }
function onSortChange(v) { state.sort = v; state.page = 1; renderList(); }

// ─── Chart (kept, collapsed) ───
function renderGraph(deferrals) {
  const container = document.getElementById('deferralGraph');
  const W = container.clientWidth || 700;
  const H = 320;
  const svg = d3.select('#deferralSvg').attr('width', W).attr('height', H);
  svg.selectAll('*').remove();
  const bySession = d3.group(deferrals, d => d.fromSession || 'unknown');
  const sessions = Array.from(bySession.keys()).sort();
  if (deferrals.length === 0) {
    svg.append('text').attr('x', W/2).attr('y', H/2).attr('text-anchor','middle').attr('fill','#82828C').attr('font-size',13).text('No deferral data');
    return;
  }
  const margin = { top: 30, right: 20, bottom: 50, left: 40 };
  const innerW = W - margin.left - margin.right, innerH = H - margin.top - margin.bottom;
  const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);
  const sessionCounts = sessions.map(s => ({ session: s, count: bySession.get(s).length, items: bySession.get(s) }));
  const xScale = d3.scaleBand().domain(sessions).range([0, innerW]).padding(0.3);
  const yMax = d3.max(sessionCounts, d => d.count) || 1;
  const yScale = d3.scaleLinear().domain([0, yMax + 1]).range([innerH, 0]);
  // Refined gradient bars (warm amber)
  const defs = svg.append('defs');
  const grad = defs.append('linearGradient').attr('id','pdBarGrad').attr('x1',0).attr('y1',0).attr('x2',0).attr('y2',1);
  grad.append('stop').attr('offset','0%').attr('stop-color','#FBBF24');
  grad.append('stop').attr('offset','100%').attr('stop-color','#F59E0B');

  g.append('g').selectAll('line').data(yScale.ticks(4)).join('line')
    .attr('x1', 0).attr('x2', innerW).attr('y1', d => yScale(d)).attr('y2', d => yScale(d))
    .attr('stroke', '#1F1F26').attr('stroke-width', 1);

  g.selectAll('.bar').data(sessionCounts).join('rect')
    .attr('x', d => xScale(d.session)).attr('y', d => yScale(d.count))
    .attr('width', xScale.bandwidth()).attr('height', d => innerH - yScale(d.count))
    .attr('rx', 3)
    .attr('fill', d => d.items.filter(i => i.status === 'pending').length > 0 ? 'url(#pdBarGrad)' : '#3F3F46');

  g.selectAll('.bl').data(sessionCounts).join('text')
    .attr('x', d => xScale(d.session) + xScale.bandwidth()/2).attr('y', d => yScale(d.count) - 5)
    .attr('text-anchor','middle')
    .attr('fill', d => d.items.filter(i => i.status === 'pending').length > 0 ? '#FCD34D' : '#71717A')
    .attr('font-size', 10).attr('font-weight', 600).text(d => d.count);

  const step = Math.ceil(sessions.length / 12);
  const xAxis = g.append('g').attr('transform', `translate(0,${innerH})`);
  xAxis.call(d3.axisBottom(xScale).tickValues(sessions.filter((_, i) => i % step === 0)).tickSize(0));
  xAxis.selectAll('text').attr('fill','#71717A').attr('font-size',9).attr('font-family','ui-monospace,monospace').attr('transform','translate(0,4) rotate(-30)').attr('text-anchor','end');
  xAxis.select('.domain').attr('stroke','#27272F');

  const yAxis = g.append('g');
  yAxis.call(d3.axisLeft(yScale).ticks(4).tickSize(0));
  yAxis.selectAll('text').attr('fill','#71717A').attr('font-size',9).attr('font-family','ui-monospace,monospace').attr('transform','translate(-6,0)');
  yAxis.select('.domain').attr('display','none');

  // Legend (refined, monospace)
  const lg = svg.append('g').attr('transform', `translate(${margin.left},${H - 12})`);
  lg.append('rect').attr('width',12).attr('height',8).attr('rx',2).attr('fill','url(#pdBarGrad)');
  lg.append('text').attr('x',18).attr('y',7).attr('fill','#A1A1AA').attr('font-size',9).attr('font-family','ui-monospace,monospace').text('has pending');
  lg.append('rect').attr('x',104).attr('width',12).attr('height',8).attr('rx',2).attr('fill','#3F3F46');
  lg.append('text').attr('x',122).attr('y',7).attr('fill','#A1A1AA').attr('font-size',9).attr('font-family','ui-monospace,monospace').text('all closed');
}

async function init() {
  const sys = await DataLoader.fetchJSON('memory/shared/system_state.json');
  const sidx = await DataLoader.getSessionIndex();
  state.all = sys?.pendingDeferrals || [];

  // map session_NNN → date for age calc
  const dates = {};
  (sidx?.sessions || []).forEach(s => {
    if (s.startedAt) dates[s.sessionId] = s.startedAt;
    else if (s.closedAt) dates[s.sessionId] = s.closedAt;
  });
  state.sessionDates = dates;

  document.getElementById('pdCount').textContent = state.all.filter(d => normalizeStatus(d.status) === 'pending').length;
  const counts = { pending: 0, resolved: 0, deprecated: 0 };
  state.all.forEach(d => counts[normalizeStatus(d.status)]++);
  // age breakdown for pending
  const pendingItems = state.all.filter(d => normalizeStatus(d.status) === 'pending');
  let stale = 0, warn = 0, fresh = 0;
  pendingItems.forEach(d => { const a = ageDays(d.fromSession); if (a == null) return; if (a >= 90) stale++; else if (a >= 30) warn++; else fresh++; });

  document.getElementById('pdMeta').innerHTML =
    `<span class="meta-pill pending">Pending ${counts.pending}</span>` +
    (stale > 0 ? `<span class="meta-pill" style="color:#EF4444;background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3)">⚠ ${stale} stale (90d+)</span>` : '') +
    (warn > 0 ? `<span class="meta-pill" style="color:#F59E0B;background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.25)">${warn} aging (30~90d)</span>` : '') +
    `<span class="meta-pill resolved">Resolved ${counts.resolved}</span>` +
    `<span class="meta-pill deprecated">Deprecated ${counts.deprecated}</span>`;

  // anchor support — if id present, switch to "all" filter so target is visible regardless of status
  const targetId = getParam('id');
  if (targetId) {
    state.target = targetId;
    state.status = 'all';
    document.getElementById('filterStatus').value = 'all';
  }

  renderList();
  renderGraph(state.all);
}
init();
</script>
</body>
</html>
