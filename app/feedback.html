<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback — Legend Team</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<style>
:root{--bg:#000000;--panel:#0B0B0D;--panel-2:#141418;--line:#26262D;--text:#F5F5F7;--text-2:#B8B8C0;--text-3:#6E6E78}
.app{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.sidebar{background:var(--panel);border-right:1px solid var(--line);padding:24px 16px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:4px;overflow-y:auto}
.brand{display:flex;align-items:center;gap:10px;padding:4px 8px 20px 8px;border-bottom:1px solid var(--line);margin-bottom:12px}
.brand-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#4F46E5,#9333EA);display:grid;place-items:center;font-weight:800;font-size:13px;color:#fff;flex-shrink:0}
.brand-name{font-size:15px;font-weight:700;letter-spacing:-.2px}.brand-tag{font-size:9px;color:var(--text-3);text-transform:uppercase;letter-spacing:.14em;margin-top:2px}
.nav-group{font-size:9px;color:var(--text-3);text-transform:uppercase;letter-spacing:.14em;padding:14px 10px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;color:var(--text-2);font-size:13px;transition:all .15s;text-decoration:none}
.nav-item:hover{background:var(--panel-2);color:var(--text)}.nav-item.active{background:linear-gradient(135deg,rgba(139,92,246,.18),rgba(6,182,212,.12));color:#fff;box-shadow:inset 0 0 0 1px rgba(139,92,246,.3)}
.nav-dot{width:6px;height:6px;border-radius:2px;flex-shrink:0}.sidebar-foot{margin-top:auto;padding:12px 10px;border-top:1px solid var(--line);font-size:11px;color:var(--text-3)}.sidebar-foot b{color:var(--text-2)}
.s-main{padding:28px 36px 64px;min-width:0}.s-crumb{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.14em}.s-h1{font-size:28px;font-weight:800;letter-spacing:-.6px;margin-top:4px;color:var(--text);margin-bottom:20px}
</style>
<body>
<div class="app">
<!-- @partial:sidebar -->
<main class="s-main">
  <div class="s-crumb">Records / Feedback</div>
  <div class="s-h1">Master Feedback Log</div>
  <div class="page" style="padding:0;max-width:none;margin:0">
    <div style="margin-bottom:16px;font-size:12px;color:var(--text-tertiary)" id="fbCount">Loading...</div>

    <div id="feedbackList"><div class="loading">Loading feedback</div></div>
  </div>

  <script src="js/data-loader.js"></script>
  <script src="js/nav.js"></script>
  <script>
    async function init() {
      const data = await DataLoader.getMasterFeedback();
      const el = document.getElementById('feedbackList');
      const countEl = document.getElementById('fbCount');

      if (data && data.feedbackLog && data.feedbackLog.length > 0) {
        countEl.textContent = `${data.feedbackLog.length} feedback entries`;
        // Show newest first
        const sorted = [...data.feedbackLog].reverse();
        el.innerHTML = sorted.map(f => {
          const decisionsHtml = f.decisions ? Object.entries(f.decisions).map(([k, v]) =>
            `<div style="font-size: 11px; color: var(--text-secondary); padding: 2px 0;"><code style="background: var(--border); padding: 1px 5px; border-radius: 3px; font-size: 10px;">${k}</code> ${v}</div>`
          ).join('') : '';

          const statusColor = f.status === 'resolved' ? '#4caf50' : f.status === 'in-progress' ? '#ff9800' : '#f44336';
          const statusLabel = f.status === 'resolved' ? 'RESOLVED' : f.status === 'in-progress' ? 'IN PROGRESS' : 'PENDING';

          return `
            <div class="feedback-item">
              <div class="feedback-id">${f.id} · ${f.session} <span style="float:right; font-size:10px; font-weight:600; color:${statusColor}; border:1px solid ${statusColor}; padding:1px 6px; border-radius:3px;">${statusLabel}</span></div>
              <div class="feedback-text">${f.feedback}</div>
              ${f.statusNote ? `<div style="font-size: 11px; color: var(--text-secondary); margin-top: 4px;">↳ ${f.statusNote}</div>` : ''}
              ${f.instruction ? `<div style="font-size: 11px; color: var(--accent-blue); margin-top: 6px; font-style: italic;">"${f.instruction}"</div>` : ''}
              ${decisionsHtml ? `<div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border);">${decisionsHtml}</div>` : ''}
              <div class="feedback-meta">${f.date} · ${f.topic} · ${f.effect || ''}</div>
            </div>
          `;
        }).join('');
      } else {
        el.innerHTML = '<div class="empty-state">No feedback recorded</div>';
        countEl.textContent = '0 entries';
      }
    }
    init();
  </script>
</div></main></div>
</body>
</html>
