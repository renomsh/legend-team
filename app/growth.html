<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Growth — Legend Team</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    /* Layout — dashboard-upgrade canonical 정합 (Phase 3 Growth) */
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Display','Inter','Pretendard',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
    a{color:inherit;text-decoration:none}
    .app{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
    .main{padding:28px 36px 64px;min-width:0}
    .topbar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;gap:16px;flex-wrap:wrap}
    .crumb{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.14em}
    .h1{font-size:28px;font-weight:800;letter-spacing:-.6px;margin-top:4px}
    .sub{font-size:12px;color:var(--text-3);margin-top:6px}
    .integrity{display:inline-flex;align-items:center;gap:8px;background:var(--panel-2);padding:6px 12px;border-radius:8px;font-size:11px;color:var(--text-2);margin-bottom:18px}
    .integrity .dot{width:7px;height:7px;border-radius:50%}

    /* 3축 헤더 (L1/L2/L3) — .kpi-row canonical 재사용 */
    .axis-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
    .axis-card{position:relative;padding:20px;border-radius:16px;background:var(--panel);border:1px solid var(--line);overflow:hidden}
    .axis-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent)}
    .axis-card.l1{--accent:var(--grad-violet)}
    .axis-card.l2{--accent:var(--grad-teal)}
    .axis-card.l3{--accent:var(--grad-amber)}
    .axis-tag{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--text-3);font-weight:600}
    .axis-name{font-size:16px;font-weight:700;margin-top:4px;letter-spacing:-.2px}
    .axis-meta{font-size:11px;color:var(--text-3);margin-top:6px}
    .axis-val{font-size:32px;font-weight:800;letter-spacing:-1px;margin-top:10px;line-height:1}
    .axis-val .unit{font-size:13px;color:var(--text-3);font-weight:500;margin-left:4px}

    /* 4×2 panel grid */
    .panel-section{margin-top:8px;margin-bottom:24px}
    .panel-section-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;gap:12px;flex-wrap:wrap}
    .panel-section-h h2{font-size:14px;font-weight:700;letter-spacing:-.2px;text-transform:uppercase;letter-spacing:.08em;color:var(--text)}
    .panel-section-h .meta{font-size:11px;color:var(--text-3)}
    .panel-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
    .panel-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:8px}
    .panel-card.empty{border-style:dashed;opacity:.7}
    .pc-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
    .pc-key{font-size:12px;font-weight:700;letter-spacing:-.1px;color:var(--text)}
    .pc-axis{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-3)}
    .pc-views{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
    .pc-view{padding:8px 10px;border-radius:8px;background:var(--panel-2);border:1px solid var(--line)}
    .pc-view-label{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-3);margin-bottom:4px}
    .pc-view-val{font-size:18px;font-weight:800;letter-spacing:-.5px;color:var(--text);font-variant-numeric:tabular-nums}
    .pc-view-val .unit{font-size:11px;color:var(--text-3);font-weight:500;margin-left:2px}
    .pc-view-n{font-size:10px;color:var(--text-3);margin-top:2px}
    .pc-foot{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:auto;padding-top:6px}
    .pc-construct{font-size:10px;color:var(--text-3);line-height:1.35;flex:1}
    .badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:10px;letter-spacing:.06em;text-transform:uppercase;font-weight:700}
    .badge.ok{background:rgba(16,185,129,.15);color:var(--ok)}
    .badge.warn{background:rgba(245,158,11,.15);color:var(--warn)}
    .badge.bad{background:rgba(239,68,68,.15);color:var(--bad)}
    .badge.baseline{background:rgba(110,110,120,.18);color:var(--text-3)}
    .empty-label{font-size:11px;color:var(--text-3);text-align:center;padding:12px 6px}

    /* Tier3 raw drill */
    .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px}
    .card-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;gap:12px}
    .card-title{font-size:14px;font-weight:700;letter-spacing:-.2px}
    .card-sub{font-size:11px;color:var(--text-3);margin-top:3px}
    .table{width:100%;border-collapse:collapse;font-size:12px}
    .table th{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);color:var(--text-3);font-weight:500;text-transform:uppercase;letter-spacing:.08em;font-size:10px}
    .table td{padding:8px 10px;border-bottom:1px solid rgba(38,38,45,.5);color:var(--text-2)}
    .table td.num{font-variant-numeric:tabular-nums;color:var(--text)}

    @media (max-width: 1023px){
      .app{grid-template-columns:1fr}
      .axis-row{grid-template-columns:1fr}
      .panel-grid{grid-template-columns:1fr 1fr}
    }
    @media (max-width: 600px){
      .panel-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
<div class="app">
  <!-- @partial:sidebar -->

  <main class="main">
    <div class="topbar">
      <div>
        <div class="crumb">Growth</div>
        <h1 class="h1">Growth Board</h1>
        <div class="sub">D-060 안 β · 3축 × 4×2 panel</div>
      </div>
    </div>

    <div class="integrity" id="integrity">
      <span class="dot" style="background:var(--text-3)"></span>
      <span id="integrityText">Loading…</span>
    </div>

    <!-- 3축 헤더 (L1 / L2 / L3) -->
    <section class="axis-row" id="axisRow">
      <div class="axis-card l1" data-axis="learning">
        <div class="axis-tag">L1 · Learning</div>
        <div class="axis-name">누적학습</div>
        <div class="axis-meta" id="axisMeta-learning">—</div>
        <div class="axis-val" id="axisVal-learning">—<span class="unit">/100</span></div>
      </div>
      <div class="axis-card l2" data-axis="judgment-consistency">
        <div class="axis-tag">L2 · Judgment Consistency</div>
        <div class="axis-name">적중률</div>
        <div class="axis-meta" id="axisMeta-judgment-consistency">—</div>
        <div class="axis-val" id="axisVal-judgment-consistency">—<span class="unit">/100</span></div>
      </div>
      <div class="axis-card l3" data-axis="execution-transfer">
        <div class="axis-tag">L3 · Execution Transfer</div>
        <div class="axis-name">자율성</div>
        <div class="axis-meta" id="axisMeta-execution-transfer">—</div>
        <div class="axis-val" id="axisVal-execution-transfer">—<span class="unit">/100</span></div>
      </div>
    </section>

    <!-- 4×2 Panel -->
    <section class="panel-section">
      <div class="panel-section-h">
        <h2>Signature Metrics · 4×2 panel</h2>
        <div class="meta">4 metric × {all · recent10}</div>
      </div>
      <div class="panel-grid" id="panelGrid">
        <div class="panel-card empty"><div class="empty-label">Loading…</div></div>
      </div>
    </section>

    <!-- Tier3 raw drill -->
    <section class="card">
      <div class="card-h">
        <div>
          <div class="card-title">Raw aggregates (drill)</div>
          <div class="card-sub">all + recent10 + recent3 · stratum 제외</div>
        </div>
        <div class="card-sub"><span id="t3Count">—</span> rows</div>
      </div>
      <div id="tier3Body"></div>
    </section>
  </main>
</div>

<script>
async function loadJson(p, fallback=null){
  try { const r = await fetch(p, {cache:'no-store'}); if (!r.ok) return fallback; return await r.json(); }
  catch(e){ return fallback; }
}

function fmt(n){ return n===null||n===undefined ? '—' : (Math.round(n*10)/10).toFixed(1); }

function alertBadge(a, baseline){
  if (baseline) return '<span class="badge baseline">baseline</span>';
  if (!a) return '<span class="badge ok">ok</span>';
  if (a.level === 'red') return '<span class="badge bad">red</span>';
  if (a.level === 'yellow') return '<span class="badge warn">yellow</span>';
  return '<span class="badge ok">ok</span>';
}

function findAggregate(agg, metricId, view){
  const all = (agg.aggregates || []).concat(agg.derivedAggregates || []);
  return all.find(a => a.metricId === metricId && a.view === view && !a.stratum);
}

// Axis → 3축 매핑 (D-060 안 β)
const AXIS_DEF = [
  { axis: 'learning',             label: 'L1', name: '누적학습' },
  { axis: 'judgment-consistency', label: 'L2', name: '적중률' },
  { axis: 'execution-transfer',   label: 'L3', name: '자율성' }
];

// 4 signature metric — 3축 + 1 quality. metricId 명시(active 지표 중 axis 대표).
const SIGNATURE_METRIC_IDS = [
  'ace.angle_novelty',         // L1 learning · ace 프레이밍 신선도
  'ace.orchestration_hit_rate',// L2 judgment-consistency · ace 적중률
  'dev.gate_pass_rate',        // L3 execution-transfer · dev 자율성
  'session.health_score'       // quality (supporting) · 종합 health
];

function axisMean(metrics, agg, axis, view){
  const ms = metrics.filter(m => m.axis === axis && m.lifecycleState === 'active');
  let sum = 0, cnt = 0;
  for (const m of ms){
    const a = findAggregate(agg, m.id, view);
    if (a && typeof a.mean === 'number'){ sum += a.mean; cnt++; }
  }
  return { mean: cnt > 0 ? sum / cnt : null, n: cnt, total: ms.length };
}

function renderAxis(metrics, agg){
  for (const def of AXIS_DEF){
    const r = axisMean(metrics, agg, def.axis, 'all');
    document.getElementById('axisVal-' + def.axis).innerHTML = fmt(r.mean) + '<span class="unit">/100</span>';
    document.getElementById('axisMeta-' + def.axis).textContent =
      r.n + ' / ' + r.total + ' metric · view=all';
  }
}

function renderPanel(metrics, agg){
  const grid = document.getElementById('panelGrid');
  grid.innerHTML = '';
  for (const id of SIGNATURE_METRIC_IDS){
    const m = metrics.find(x => x.id === id);
    if (!m){
      // 빈 슬롯 — 데이터 부재
      const card = document.createElement('div');
      card.className = 'panel-card empty';
      card.innerHTML = `
        <div class="pc-head">
          <div class="pc-key">${id}</div>
          <span class="badge baseline">missing</span>
        </div>
        <div class="empty-label">Phase 4+ 채울 예정</div>
      `;
      grid.appendChild(card);
      continue;
    }
    const aAll = findAggregate(agg, m.id, 'all');
    const aR10 = findAggregate(agg, m.id, 'recent10');
    const baselineAll = !aAll || aAll.n < (m.baselineSessions ?? 10);
    const baselineR10 = !aR10 || aR10.n < (m.baselineSessions ?? 10);
    const card = document.createElement('div');
    card.className = 'panel-card';
    card.innerHTML = `
      <div class="pc-head">
        <div>
          <div class="pc-key">${m.shortKey}</div>
          <div class="pc-axis">${m.axis} · ${m.role}</div>
        </div>
        ${alertBadge(aAll?.alert, baselineAll)}
      </div>
      <div class="pc-views">
        <div class="pc-view">
          <div class="pc-view-label">all</div>
          <div class="pc-view-val">${fmt(aAll?.mean)}<span class="unit">/100</span></div>
          <div class="pc-view-n">n=${aAll?.n ?? 0}</div>
        </div>
        <div class="pc-view">
          <div class="pc-view-label">recent10</div>
          <div class="pc-view-val">${fmt(aR10?.mean)}<span class="unit">/100</span></div>
          <div class="pc-view-n">n=${aR10?.n ?? 0}</div>
        </div>
      </div>
      <div class="pc-foot">
        <div class="pc-construct">${m.construct || ''}</div>
      </div>
    `;
    grid.appendChild(card);
  }
}

function renderTier3(agg){
  const all = (agg.aggregates || []).concat(agg.derivedAggregates || []);
  document.getElementById('t3Count').textContent = all.length;
  let html = '<table class="table"><thead><tr><th>Metric</th><th>Role</th><th>View</th><th>Stratum</th><th>Mean</th><th>n</th><th>Std</th></tr></thead><tbody>';
  for (const a of all){
    html += `<tr>
      <td>${a.metricId}</td>
      <td>${a.role}</td>
      <td>${a.view}</td>
      <td>${a.stratum?.grade ? 'grade='+a.stratum.grade : '—'}</td>
      <td class="num">${fmt(a.mean)}</td>
      <td class="num">${a.n}</td>
      <td class="num">${fmt(a.std)}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  document.getElementById('tier3Body').innerHTML = html;
}

function renderIntegrity(agg, registry){
  const el = document.getElementById('integrity');
  const dot = el.querySelector('.dot');
  const text = document.getElementById('integrityText');
  if (!agg || !registry){
    dot.style.background = 'var(--bad)';
    text.textContent = 'aggregate or registry not found — run scripts/compute-signature-metrics.ts';
    return;
  }
  const sla = agg.slaBreached ? 'SLA BREACH ' + agg.durationMs + 'ms' : 'SLA ok ' + agg.durationMs + 'ms';
  const warns = (agg.warnings || []).length;
  dot.style.background = agg.slaBreached || warns > 5 ? 'var(--warn)' : 'var(--ok)';
  const activeCnt = registry.metrics.filter(m => m.lifecycleState === 'active').length;
  text.textContent = `registry ${agg.registryVersion} · ${activeCnt} active metric · ${agg.recordCount} records · ${sla} · ${warns} warning(s)`;
}

(async function init(){
  const flags = await loadJson('data/memory/shared/feature_flags.json', {flags:{}});
  const registry = await loadJson('data/memory/growth/metrics_registry.json');
  const agg = await loadJson('data/memory/growth/signature_metrics_aggregate.json');

  if (flags?.flags?.signatureMetricsEnabled === false){
    document.querySelector('main').innerHTML = '<div class="card" style="margin-top:20px"><div class="card-title">Signature metrics feature flag is OFF.</div></div>';
    return;
  }

  renderIntegrity(agg, registry);
  if (!registry || !agg){
    document.getElementById('panelGrid').innerHTML = '<div class="panel-card empty"><div class="empty-label">Run <code>npx ts-node scripts/compute-signature-metrics.ts</code> to generate aggregates.</div></div>';
    return;
  }

  renderAxis(registry.metrics, agg);
  renderPanel(registry.metrics, agg);
  renderTier3(agg);
})();
</script>
</body>
</html>
