<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>People · Legend Team</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;margin:0}
    .app{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
    .sidebar{background:var(--panel);border-right:1px solid var(--line);padding:24px 16px;height:100vh;position:sticky;top:0}
    .nav-item{display:block;padding:9px 10px;border-radius:8px;color:var(--text-2);text-decoration:none;font-size:13px;margin-bottom:2px}
    .nav-item.active{background:linear-gradient(135deg,rgba(139,92,246,.18),rgba(6,182,212,.12));color:#fff}
    .nav-group{font-size:9px;color:var(--text-3);text-transform:uppercase;letter-spacing:.14em;padding:14px 10px 6px}
    .s-sub{font-size:12px;color:var(--text-3);margin-bottom:24px}
    .tier{margin-bottom:36px}
    .tier-h{display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid var(--line);padding-bottom:8px;margin-bottom:14px}
    .tier-h h2{font-size:14px;font-weight:700;color:var(--text);margin:0;text-transform:uppercase;letter-spacing:.08em}
    .tier-h .meta{font-size:11px;color:var(--text-3)}
    .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;position:relative;transition:border-color .15s}
    .card:hover{border-color:rgba(139,92,246,.35)}
    .card .role{display:inline-flex;align-items:center;gap:8px;font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em}
    .role-dot{width:8px;height:8px;border-radius:2px}
    .card .name{font-size:18px;font-weight:700;margin:6px 0 2px}
    .card .topMetric{font-size:11px;color:var(--text-2)}
    .card .score{font-size:32px;font-weight:800;letter-spacing:-1px;margin:6px 0 2px}
    .card .score .unit{font-size:13px;color:var(--text-3);font-weight:500}
    .card .ci{font-size:10px;color:var(--text-3);margin-top:2px}
    .card .badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:10px;margin-top:6px;letter-spacing:.06em;text-transform:uppercase}
    .badge.ok{background:rgba(16,185,129,.15);color:var(--ok)}
    .badge.warn{background:rgba(245,158,11,.15);color:var(--warn)}
    .badge.bad{background:rgba(239,68,68,.15);color:var(--bad)}
    .badge.baseline{background:rgba(110,110,120,.18);color:var(--text-3)}
    .table{width:100%;border-collapse:collapse;font-size:12px}
    .table th{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);color:var(--text-3);font-weight:500;text-transform:uppercase;letter-spacing:.08em;font-size:10px}
    .table td{padding:8px 10px;border-bottom:1px solid rgba(38,38,45,.5);color:var(--text-2)}
    .table td.num{font-variant-numeric:tabular-nums;color:var(--text)}
    .integrity{display:inline-flex;align-items:center;gap:8px;background:var(--panel-2);padding:6px 12px;border-radius:8px;font-size:11px;color:var(--text-2);margin-bottom:10px}
    .integrity .dot{width:7px;height:7px;border-radius:50%}
    .empty{padding:40px 20px;text-align:center;color:var(--text-3);font-size:12px;border:1px dashed var(--line);border-radius:10px}
    select{background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:6px;padding:4px 8px;font-size:11px}
  </style>
</head>
<body>
<div class="app">
  <!-- @partial:sidebar -->

  <main class="s-main">
    <div class="s-crumb">People / Signature Cards</div>
    <h1 class="s-h1">People</h1>
    <div class="s-sub">8 역할 시그니처 카드 뷰어 — 3-tier (overview · role · drill)</div>
    <div class="integrity" id="integrity">
      <span class="dot" style="background:var(--text-3)"></span>
      <span id="integrityText">Loading…</span>
    </div>

    <section class="tier" id="tier1">
      <div class="tier-h">
        <h2>Tier 1 · Role Overview</h2>
        <div class="meta"><span id="t1Count">—</span> roles · view
          <select id="viewSelect">
            <option value="all">all</option>
            <option value="recent10">recent10</option>
            <option value="recent3">recent3</option>
          </select>
        </div>
      </div>
      <div class="cards" id="tier1Cards">
        <div class="card" data-skeleton="true"><div class="role">Loading…</div></div>
      </div>
    </section>

    <section class="tier" id="tier2">
      <div class="tier-h">
        <h2>Tier 2 · Per-Role Detail</h2>
        <div class="meta">role
          <select id="roleSelect"></select>
        </div>
      </div>
      <div id="tier2Body"></div>
    </section>

    <section class="tier" id="tier3">
      <div class="tier-h">
        <h2>Tier 3 · Drill (raw aggregates)</h2>
        <div class="meta"><span id="t3Count">—</span> rows</div>
      </div>
      <div id="tier3Body"></div>
    </section>
  </main>
</div>

<script src="js/nav.js"></script>
<script src="js/role-colors.js" onerror="window.ROLE_COLORS=null"></script>
<script>
const ROLE_COLOR = (window.ROLE_COLORS) || {
  ace:'#8B5CF6', arki:'#06B6D4', fin:'#F59E0B', riki:'#EF4444',
  nova:'#10B981', dev:'#3B82F6', vera:'#F472B6', editor:'#9CA3AF'
};

async function loadJson(p, fallback=null){
  try { const r = await fetch(p, {cache:'no-store'}); if (!r.ok) return fallback; return await r.json(); }
  catch(e){ return fallback; }
}

function fmt(n){ return n===null||n===undefined ? '—' : (Math.round(n*10)/10).toFixed(1); }

function alertBadge(a, baseline){
  if (baseline) return '<span class="badge baseline">baseline</span>';
  if (!a) return '<span class="badge ok">ok</span>';
  if (a.level === 'red') return '<span class="badge bad">red</span>';
  if (a.level === 'yellow') return '<span class="badge warn">yellow</span>';
  return '<span class="badge ok">ok</span>';
}

function topMetricForRole(roleId, registry){
  // priority: composition derived (e.g., {role}.health_score) → first base learning → first base
  const ms = registry.metrics.filter(m => m.role === roleId);
  const derived = ms.find(m => m.type === 'derived');
  if (derived) return derived;
  const learn = ms.find(m => m.axis === 'learning');
  return learn || ms[0] || null;
}

function findAggregate(agg, metricId, view){
  const all = (agg.aggregates || []).concat(agg.derivedAggregates || []);
  return all.find(a => a.metricId === metricId && a.view === view && !a.stratum);
}

function renderTier1(roles, registry, agg, view){
  const grid = document.getElementById('tier1Cards');
  grid.innerHTML = '';
  let shown = 0;
  for (const role of roles) {
    const m = topMetricForRole(role.id, registry);
    if (!m) continue;
    const a = findAggregate(agg, m.id, view);
    const baseline = !a || a.n === 0 || a.n < (m.baselineSessions ?? 10);
    const score = a ? a.mean : null;
    const ci = a && a.ci95 ? `CI95 [${fmt(a.ci95[0])}, ${fmt(a.ci95[1])}] · n=${a.n}` : `n=${a?.n ?? 0}`;
    const card = document.createElement('div');
    card.className = 'card';
    card.style.borderColor = baseline ? 'var(--line)' : 'rgba(139,92,246,.25)';
    card.innerHTML = `
      <div class="role"><span class="role-dot" style="background:${role.color || ROLE_COLOR[role.id] || '#888'}"></span>${role.displayName}</div>
      <div class="name">${role.displayName}</div>
      <div class="topMetric">${m.shortKey} <span style="color:var(--text-3)">· ${m.axis}</span></div>
      <div class="score">${fmt(score)}<span class="unit"> /100</span></div>
      <div class="ci">${ci}</div>
      ${alertBadge(a?.alert, baseline)}
    `;
    grid.appendChild(card);
    shown++;
  }
  document.getElementById('t1Count').textContent = shown;
  if (shown === 0) grid.innerHTML = '<div class="empty">No Tier-1 roles found in registry.</div>';
}

function renderTier2(roleId, registry, agg, view){
  const body = document.getElementById('tier2Body');
  const ms = registry.metrics.filter(m => m.role === roleId);
  if (ms.length === 0) { body.innerHTML = '<div class="empty">No metrics for this role.</div>'; return; }
  let html = '<table class="table"><thead><tr><th>Metric</th><th>Axis</th><th>Mean</th><th>n</th><th>CI95</th><th>Alert</th></tr></thead><tbody>';
  for (const m of ms) {
    const a = findAggregate(agg, m.id, view);
    const baseline = !a || a.n < (m.baselineSessions ?? 10);
    const ci = a && a.ci95 ? `[${fmt(a.ci95[0])}, ${fmt(a.ci95[1])}]` : '—';
    html += `<tr>
      <td>${m.shortKey} <span style="color:var(--text-3);font-size:10px">${m.id}</span></td>
      <td>${m.axis}</td>
      <td class="num">${fmt(a?.mean)}</td>
      <td class="num">${a?.n ?? 0}</td>
      <td class="num">${ci}</td>
      <td>${alertBadge(a?.alert, baseline)}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  body.innerHTML = html;
}

function renderTier3(agg){
  const all = (agg.aggregates || []).concat(agg.derivedAggregates || []);
  document.getElementById('t3Count').textContent = all.length;
  let html = '<table class="table"><thead><tr><th>Metric</th><th>Role</th><th>View</th><th>Stratum</th><th>Mean</th><th>n</th><th>Std</th></tr></thead><tbody>';
  for (const a of all) {
    html += `<tr>
      <td>${a.metricId}</td>
      <td>${a.role}</td>
      <td>${a.view}</td>
      <td>${a.stratum?.grade ? 'grade='+a.stratum.grade : '—'}</td>
      <td class="num">${fmt(a.mean)}</td>
      <td class="num">${a.n}</td>
      <td class="num">${fmt(a.std)}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  document.getElementById('tier3Body').innerHTML = html;
}

function renderIntegrity(agg, flags){
  const el = document.getElementById('integrity');
  const dot = el.querySelector('.dot');
  const text = document.getElementById('integrityText');
  if (!agg) {
    dot.style.background = 'var(--bad)'; text.textContent = 'aggregate not found';
    return;
  }
  const sla = agg.slaBreached ? 'SLA BREACH ' + agg.durationMs + 'ms' : 'SLA ok ' + agg.durationMs + 'ms';
  const warns = (agg.warnings || []).length;
  const cards = flags?.flags?.signatureMetricsCardsVisible !== false;
  dot.style.background = agg.slaBreached || warns > 5 ? 'var(--warn)' : 'var(--ok)';
  text.textContent = `registry ${agg.registryVersion} · ${agg.recordCount} records · ${sla} · ${warns} warning(s)` + (cards ? '' : ' · cards hidden by flag');
}

(async function init(){
  const flags = await loadJson('data/memory/shared/feature_flags.json', {flags:{}});
  const registry = await loadJson('data/memory/growth/metrics_registry.json');
  const roles = (await loadJson('data/memory/shared/role_registry.json', {roles:[]})).roles;
  const agg = await loadJson('data/memory/growth/signature_metrics_aggregate.json');

  if (flags?.flags?.signatureMetricsEnabled === false) {
    document.querySelector('main').innerHTML = '<div class="empty" style="margin-top:80px">Signature metrics feature flag is OFF.</div>';
    return;
  }

  renderIntegrity(agg, flags);
  if (!registry || !agg) {
    document.getElementById('tier1Cards').innerHTML = '<div class="empty">Run <code>npx ts-node scripts/compute-signature-metrics.ts</code> to generate aggregates.</div>';
    return;
  }

  // Role select for tier 2
  const sel = document.getElementById('roleSelect');
  for (const r of roles) {
    const o = document.createElement('option');
    o.value = r.id; o.textContent = r.displayName;
    sel.appendChild(o);
  }
  sel.value = 'ace';

  const viewSel = document.getElementById('viewSelect');

  function rerender(){
    const v = viewSel.value;
    renderTier1(roles, registry, agg, v);
    renderTier2(sel.value, registry, agg, v);
  }
  viewSel.addEventListener('change', rerender);
  sel.addEventListener('change', rerender);

  rerender();
  renderTier3(agg);
})();
</script>
</body>
</html>
