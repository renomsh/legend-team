<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sessions — Legend Team</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <link rel="stylesheet" href="css/components.css">
  <style>
.tab-btn.active{color:#10B981;border-bottom-color:#10B981}

/* History list */
.sess-table tbody tr{cursor:pointer;transition:background .12s}
.sess-table tbody tr:hover td{background:rgba(16,185,129,.05)}
.sess-table .td-id{font-family:'SF Mono',monospace;color:#06B6D4;font-weight:700;font-size:11px;white-space:nowrap}
.sess-table .td-topic{color:var(--text);font-weight:500;max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sess-table .td-date{color:var(--text-3);font-size:11px;white-space:nowrap}
.sess-table .td-num{text-align:right;font-variant-numeric:tabular-nums;color:var(--text)}
.sess-table .td-num.zero{color:var(--text-3)}
.sess-table .td-roles{display:flex;gap:3px;flex-wrap:wrap}
.role-chip{font-size:9px;padding:1px 6px;border-radius:8px;font-weight:600;border:1px solid transparent;letter-spacing:.02em}
.dq-auto{color:#10B981;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);padding:1px 7px;border-radius:8px;font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.dq-backfill{color:#F59E0B;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);padding:1px 7px;border-radius:8px;font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.dq-manual{color:#6E6E78;background:rgba(110,110,120,.1);border:1px solid rgba(110,110,120,.2);padding:1px 7px;border-radius:8px;font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}

/* Role Freq KPI strip (top) */
.rf-strip{display:flex;flex-wrap:wrap;gap:18px;padding:14px 16px;background:var(--panel);border:1px solid var(--line);border-radius:8px;margin-bottom:18px}
.rf-strip-item{display:flex;align-items:center;gap:8px;font-size:13px}
.rf-strip-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rf-strip-item .label{color:var(--text-2);font-weight:500;min-width:36px}
.rf-strip-item .count{color:var(--text);font-weight:700;font-variant-numeric:tabular-nums}

/* Toolbar */
.list-toolbar{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:14px;padding:12px 14px;background:var(--panel);border:1px solid var(--line);border-radius:8px}
.list-search{flex:1;min-width:220px;padding:7px 12px;font-size:13px;background:var(--bg);border:1px solid var(--line);border-radius:6px;color:var(--text);outline:none}
.list-search:focus{border-color:#10B981}
.filter-select{background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:7px 12px;color:var(--text-2);font-size:12px;outline:none;cursor:pointer}

/* Pager */
.pager{display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding-top:14px;border-top:1px solid var(--line);flex-wrap:wrap;gap:10px}
.pager-info{font-size:12px;color:var(--text-3)}
.pager-ctrls{display:flex;gap:4px;align-items:center}
.pbtn{min-width:32px;padding:6px 10px;font-size:12px;color:var(--text-2);background:transparent;border:1px solid var(--line);border-radius:5px;cursor:pointer}
.pbtn:hover:not(.disabled):not(.active){color:var(--text);border-color:var(--text-3)}
.pbtn.active{color:#fff;background:#10B981;border-color:#10B981;font-weight:600}
.pbtn.disabled{opacity:0.35;cursor:not-allowed}
.pdot{padding:0 4px;color:var(--text-3);font-size:12px}

/* Detail meta */
.s-meta{font-size:12px;color:var(--text-3);margin-bottom:24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.meta-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;font-size:11px;font-weight:500;border-radius:4px;border:1px solid var(--line);color:var(--text-2)}
.meta-pill.grade{color:#10B981;background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.25)}
.meta-pill.dq{color:#06B6D4;background:rgba(6,182,212,.08);border-color:rgba(6,182,212,.25)}

/* Detail tabs */
.report-item.card{margin-bottom:12px;padding:0}

/* Decisions */
.decision-item{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:12px 14px;margin-bottom:8px}
.decision-id{font-size:11px;font-family:monospace;color:#F59E0B;font-weight:700;margin-bottom:2px}
.decision-axis{font-size:13px;color:var(--text);font-weight:600;margin-bottom:4px}
.decision-value{font-size:12px;color:var(--text-2);line-height:1.5}

/* Turns */
.turn-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;margin-bottom:6px;font-size:12px}
.turn-idx{font-family:monospace;color:var(--text-3);min-width:28px;text-align:right}
.turn-role-chip{font-weight:700;padding:3px 10px;border-radius:4px;letter-spacing:.02em}
.turn-phase{color:var(--text-3);font-size:11px}
.turn-meta{margin-left:auto;color:var(--text-3);font-size:11px;font-style:italic}
  </style>
</head>
<body>
<a href="#main-content" class="skip-link">본문으로 건너뛰기</a>
<div class="app">
<!-- @partial:sidebar -->
<main class="s-main" id="main-content">
  <div class="s-crumb" id="crumb">Records / Sessions</div>
  <div class="s-h1" id="pageTitle"><div class="loading">Loading</div></div>
  <div class="s-meta" id="pageMeta"></div>

  <!-- Detail mode tab bar (hidden in list mode) -->
  <div class="tab-bar" role="tablist" aria-label="세션 탭" id="detailTabs" style="display:none">
    <button class="tab-btn active" role="tab" aria-selected="true" id="tab-btn-reports" onclick="showTab('reports', this)">Reports</button>
    <button class="tab-btn" role="tab" aria-selected="false" id="tab-btn-decisions" onclick="showTab('decisions', this)">Decisions</button>
    <button class="tab-btn" role="tab" aria-selected="false" id="tab-btn-turns" onclick="showTab('turns', this)">Turns</button>
  </div>

  <div id="contentRoot"></div>
</main>
</div>

<script src="js/role-colors.js"></script>
<script src="js/data-loader.js"></script>
<script src="js/md-renderer.js"></script>
<script src="js/nav.js"></script>
<script src="js/sequence-panel.js"></script>
<script>
const ROLE_COLORS = window.ROLE_COLORS;
const PAGE_SIZE = 50;

function escHtmlSafe(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric', year: 'numeric' });
}
function statusBadge(s) {
  const cfg = { open: ['#10B981','rgba(16,185,129,.12)'], closed: ['#6E6E78','rgba(110,110,120,.1)'], 'in-progress': ['#06B6D4','rgba(6,182,212,.12)'] };
  const [c, bg] = cfg[s] || ['#6E6E78','rgba(110,110,120,.1)'];
  return `<span style="font-size:11px;padding:2px 10px;border-radius:20px;font-weight:600;color:${c};background:${bg};border:1px solid ${c}40">${s}</span>`;
}

// ════════════════════════════════════════
// LIST MODE
// ════════════════════════════════════════
let listState = { all: [], page: 1, search: '', filter: '' };

async function initList() {
  document.getElementById('pageTitle').innerHTML = `Sessions <span style="display:inline-block;margin-left:10px;padding:3px 12px;font-size:14px;font-weight:600;color:#10B981;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);border-radius:999px;vertical-align:middle" id="sessCountChip">…</span>`;

  const data = await DataLoader.getDashboardData();
  const sessions = (data?.sessions || []).slice().reverse();
  const roleFreq = data?.roleFrequency || [];
  const turnSequences = data?.turnSequences || [];
  listState.all = sessions;

  document.getElementById('sessCountChip').textContent = sessions.length;
  const auto = sessions.filter(s => s.dataQuality === 'auto').length;
  const backfill = sessions.filter(s => s.dataQuality === 'backfill').length;
  const manual = sessions.length - auto - backfill;
  document.getElementById('pageMeta').innerHTML =
    `<span class="meta-pill" style="color:#10B981;background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.25)">auto ${auto}</span>` +
    `<span class="meta-pill" style="color:#F59E0B;background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.25)">backfill ${backfill}</span>` +
    `<span class="meta-pill">manual ${manual}</span>`;

  const roleStrip = roleFreq.map(r => {
    const role = r.role === 'editor' ? 'edi' : r.role;
    const color = ROLE_COLORS[role] || '#6E6E78';
    const label = (window.ROLE_LABELS||{})[role] || role;
    return `<div class="rf-strip-item">
      <span class="dot" style="background:${color}"></span>
      <span class="label">${label}</span>
      <span class="count" style="color:${color}">${r.count}</span>
    </div>`;
  }).join('');

  document.getElementById('contentRoot').innerHTML = `
    <div class="section-title">Role Call Frequency</div>
    <div class="rf-strip">${roleStrip || '<span style="color:var(--text-3);font-size:12px">No data</span>'}</div>

    <div class="section-title">Turn Sequence</div>
    <div class="card" style="padding:16px;margin-bottom:24px">
      <div id="sequencePanelCard" style="position:relative;width:100%;height:280px">
        <svg id="seqSvg" width="100%" height="100%" role="img" aria-label="Turn sequence timeline"></svg>
        <div id="seqEmpty" class="empty-state" style="display:none;position:absolute;inset:0;margin:0;border:none">No turn sequences yet</div>
      </div>
    </div>

    <div class="section-title">All Sessions</div>
    <div class="list-toolbar">
      <input type="search" class="list-search" id="histSearch" placeholder="Search session ID or topic…" oninput="onListSearch(this.value)">
      <select class="filter-select" id="histFilter" onchange="onListFilter(this.value)">
        <option value="">All quality</option>
        <option value="auto">auto</option>
        <option value="backfill">backfill</option>
        <option value="manual">manual</option>
      </select>
    </div>
    <div id="histTableWrap"></div>
    <div id="histPager" class="pager"></div>`;

  if (window.SequencePanel) window.SequencePanel.render({ sequences: turnSequences });
  renderList();
}

function applyListFilters() {
  const q = listState.search.toLowerCase();
  const qf = listState.filter;
  return listState.all.filter(s => {
    const matchQ = !q || s.sessionId.toLowerCase().includes(q) || (s.topic||'').toLowerCase().includes(q) || (s.topicSlug||'').toLowerCase().includes(q);
    const matchF = !qf || s.dataQuality === qf;
    return matchQ && matchF;
  });
}

function renderList() {
  const filtered = applyListFilters();
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (listState.page > totalPages) listState.page = totalPages;
  const start = (listState.page - 1) * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);

  const wrap = document.getElementById('histTableWrap');
  if (!total) {
    wrap.innerHTML = '<div class="empty-state">No sessions match the current filter</div>';
    document.getElementById('histPager').innerHTML = '';
    return;
  }

  const rows = slice.map(s => {
    const dqClass = `dq-${s.dataQuality || 'manual'}`;
    const roles = (s.agentsCompleted || []).map(r => {
      const role = r === 'editor' ? 'edi' : r;
      const c = ROLE_COLORS[role] || '#6E6E78';
      return `<span class="role-chip" style="color:${c};background:${c}18;border-color:${c}30">${escHtmlSafe(role)}</span>`;
    }).join('');
    const decN = s.decisionAxes || 0;
    const trnN = s.masterTurns || 0;
    return `<tr onclick="location.href='session.html?id=${s.sessionId}'" data-sid="${s.sessionId}">
      <td class="td-id">${s.sessionId}</td>
      <td class="td-topic">${escHtmlSafe(s.topic || s.topicSlug || '—')}</td>
      <td class="td-date">${formatDate(s.startedAt)}</td>
      <td class="td-num">${s.size != null ? s.size : '—'}</td>
      <td class="td-num ${decN ? '' : 'zero'}">${decN}</td>
      <td class="td-num ${trnN ? '' : 'zero'}">${trnN}</td>
      <td><span class="${dqClass}">${s.dataQuality||'manual'}</span></td>
      <td><div class="td-roles">${roles}</div></td>
    </tr>`;
  }).join('');

  wrap.innerHTML = `<div class="table-scroll"><table class="table sess-table">
    <thead><tr>
      <th>Session</th><th>Topic</th><th>Date</th>
      <th style="text-align:right">Size</th><th style="text-align:right">Decisions</th><th style="text-align:right">Turns</th>
      <th>Quality</th><th>Roles</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;

  renderListPager(total, totalPages, start, slice.length);
}

function renderListPager(total, totalPages, start, sliceLen) {
  const pager = document.getElementById('histPager');
  const startN = start + 1;
  const endN = start + sliceLen;
  const btn = (label, page, opts={}) => {
    const cls = ['pbtn'];
    if (opts.active) cls.push('active');
    if (opts.disabled) cls.push('disabled');
    const onclick = opts.disabled ? '' : `onclick="goToPage(${page})"`;
    return `<button class="${cls.join(' ')}" ${onclick}>${label}</button>`;
  };
  let pageBtns = '';
  const w = 2;
  for (let p = 1; p <= totalPages; p++) {
    if (p === 1 || p === totalPages || (p >= listState.page - w && p <= listState.page + w)) {
      pageBtns += btn(p, p, { active: p === listState.page });
    } else if (p === listState.page - w - 1 || p === listState.page + w + 1) {
      pageBtns += '<span class="pdot">…</span>';
    }
  }
  pager.innerHTML = `<div class="pager-info">${startN}–${endN} of ${total}</div>
    <div class="pager-ctrls">${btn('‹ Prev', listState.page - 1, {disabled: listState.page <= 1})}${pageBtns}${btn('Next ›', listState.page + 1, {disabled: listState.page >= totalPages})}</div>`;
}

function goToPage(p) { listState.page = p; renderList(); window.scrollTo({top:0,behavior:'smooth'}); }
let _lt;
function onListSearch(v) { clearTimeout(_lt); _lt = setTimeout(() => { listState.search = v; listState.page = 1; renderList(); }, 150); }
function onListFilter(v) { listState.filter = v; listState.page = 1; renderList(); }

// ════════════════════════════════════════
// DETAIL MODE
// ════════════════════════════════════════
function showTab(name, btn) {
  ['reports','decisions','turns'].forEach(n => {
    const el = document.getElementById('tab-' + n);
    if (el) el.style.display = (n === name) ? 'block' : 'none';
  });
  btn.parentElement.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected','false'); });
  btn.classList.add('active');
  btn.setAttribute('aria-selected', 'true');
}

async function initDetail(sessionId) {
  const sidx = await DataLoader.getSessionIndex();
  const dash = await DataLoader.getDashboardData();
  const idxSess = (sidx?.sessions || []).find(s => s.sessionId === sessionId);
  const dashSess = (dash?.sessions || []).find(s => s.sessionId === sessionId);
  const sess = idxSess ? { ...dashSess, ...idxSess } : dashSess;
  if (!sess) {
    document.getElementById('pageTitle').textContent = `Session ${sessionId} not found`;
    return;
  }
  document.title = `${sess.sessionId} — Sessions — Legend Team`;
  document.getElementById('crumb').innerHTML = `Records / <a href="session.html" style="color:var(--text-3);text-decoration:none">Sessions</a>`;
  document.getElementById('pageTitle').textContent = sess.topic || sess.topicSlug || sess.sessionId;

  const grade = sess.grade ? `<span class="meta-pill grade">${sess.grade}</span>` : '';
  const dq = sess.dataQuality ? `<span class="meta-pill dq">${sess.dataQuality}</span>` : '';
  document.getElementById('pageMeta').innerHTML =
    `<span style="font-family:monospace;color:#06B6D4;font-size:11px">${sess.sessionId}</span>` +
    statusBadge(sess.status || 'closed') +
    grade + dq +
    `<span>${formatDate(sess.startedAt)}</span>` +
    (sess.topicId ? `<a href="topic.html?id=${sess.topicId}" style="color:var(--text-3);font-size:11px;text-decoration:underline">→ ${sess.topicId}</a>` : '');

  document.getElementById('detailTabs').style.display = '';
  document.getElementById('contentRoot').innerHTML = `
    <div id="tab-reports"></div>
    <div id="tab-decisions" style="display:none"></div>
    <div id="tab-turns" style="display:none"></div>`;

  // Reports
  const reportsEl = document.getElementById('tab-reports');
  const date = (sess.startedAt || sess.closedAt || '').slice(0, 10);
  const folder = (date && sess.topicSlug) ? `${date}_${sess.topicSlug}` : null;
  const roles = Array.from(new Set(sess.agentsCompleted || []));
  if (folder && roles.length > 0) {
    const items = roles.map(r => {
      const role = r === 'editor' ? 'edi' : r;
      const f = `${role}_rev1.md`;
      const key = `${sess.sessionId}-${f}`;
      return `<div class="report-item card" id="report-${key}">
        <div class="report-header" onclick="toggleReport('${folder}/${f}', '${key}')">
          <span class="report-icon">&#x1F4C4;</span>
          <span class="report-name">${f}</span>
          <span class="report-toggle" id="toggle-${key}">&#x25B6;</span>
        </div>
        <div class="report-body" id="body-${key}"></div>
      </div>`;
    }).join('');
    reportsEl.innerHTML = items;
  } else {
    reportsEl.innerHTML = '<div class="empty-state">No report files</div>';
  }

  // Decisions — match by session field on decision_ledger entries
  const decData = await DataLoader.getDecisionLedger();
  const decs = (decData?.decisions || []).filter(d => d.session === sessionId);
  const inline = [...(sess.decisions || []), ...(sess.masterDecisions || [])];
  const allDecs = [...decs, ...inline.filter(md => !decs.some(d => d.id === md.id))];
  document.getElementById('tab-decisions').innerHTML = allDecs.length > 0
    ? allDecs.map(d => `<div class="decision-item">
        <div class="decision-id">${escHtmlSafe(d.id || '')}</div>
        <div class="decision-axis">${escHtmlSafe(d.axis || '')}</div>
        <div class="decision-value">${escHtmlSafe(d.value || d.summary || '')}</div>
      </div>`).join('')
    : '<div class="empty-state">No decisions in this session</div>';

  // Turns
  const turns = sess.turns || [];
  const turnsEl = document.getElementById('tab-turns');
  if (turns.length === 0) {
    turnsEl.innerHTML = '<div class="empty-state">No turn data (legacy or pre-Turn[] schema)</div>';
  } else {
    turnsEl.innerHTML = turns.map(t => {
      const role = t.role === 'editor' ? 'edi' : (t.role || 'unknown');
      const c = ROLE_COLORS[role] || '#6E6E78';
      const recall = t.recallReason ? ` <span class="turn-meta">recall: ${escHtmlSafe(t.recallReason)}</span>` : '';
      return `<div class="turn-row">
        <span class="turn-idx">#${t.turnIdx}</span>
        <span class="turn-role-chip" style="color:${c};background:${c}18;border:1px solid ${c}30">${escHtmlSafe(role)}</span>
        ${t.phase ? `<span class="turn-phase">${escHtmlSafe(t.phase)}</span>` : ''}
        ${recall}
      </div>`;
    }).join('');
  }
}

const _loadedReports = {};
async function toggleReport(path, key) {
  const body = document.getElementById('body-' + key);
  const toggle = document.getElementById('toggle-' + key);
  if (body.classList.contains('open')) {
    body.classList.remove('open'); toggle.classList.remove('open'); return;
  }
  if (!_loadedReports[path]) {
    body.innerHTML = '<div class="loading">Loading report</div>';
    body.classList.add('open'); toggle.classList.add('open');
    const md = await DataLoader.getReport(path);
    _loadedReports[path] = md ? `<div class="md-content">${mdToHtml(md)}</div>` : '<div class="empty-state">Could not load report</div>';
  }
  body.innerHTML = _loadedReports[path];
  body.classList.add('open'); toggle.classList.add('open');
}

// ════════════════════════════════════════
async function init() {
  const sid = getParam('id');
  if (sid) await initDetail(sid);
  else await initList();
}
init();
</script>
</body>
</html>
