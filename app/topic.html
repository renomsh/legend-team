<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Topic — Legend Team</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="nav">
    <span class="nav-brand">LEGEND TEAM</span>
    <a href="index.html" class="nav-link">Dashboard</a>
    <a href="decisions.html" class="nav-link">Decisions</a>
    <a href="session.html" class="nav-link">Session</a>
    <a href="feedback.html" class="nav-link">Feedback</a>
  </nav>

  <div class="page">
    <div class="page-header">
      <div class="page-sub"><a href="index.html">&larr; Dashboard</a></div>
      <div class="page-title" id="topicTitle"><div class="loading">Loading</div></div>
      <div class="page-sub" id="topicMeta"></div>
    </div>

    <!-- Tab navigation -->
    <div style="display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 24px;">
      <button class="nav-link active" onclick="showTab('reports', this)">Reports</button>
      <button class="nav-link" onclick="showTab('decisions', this)">Decisions</button>
      <button class="nav-link" onclick="showTab('feedback', this)">Feedback</button>
    </div>

    <div id="tab-reports"></div>
    <div id="tab-decisions" style="display:none"></div>
    <div id="tab-feedback" style="display:none"></div>
  </div>

  <script src="js/data-loader.js"></script>
  <script src="js/md-renderer.js"></script>
  <script src="js/nav.js"></script>
  <script>
    function showTab(name, btn) {
      document.querySelectorAll('[id^="tab-"]').forEach(el => el.style.display = 'none');
      document.getElementById('tab-' + name).style.display = 'block';
      btn.parentElement.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    async function init() {
      const topicId = getParam('id');
      if (!topicId) {
        document.getElementById('topicTitle').textContent = 'No topic specified';
        return;
      }

      // Find topic in index
      const topicData = await DataLoader.getTopicIndex();
      const topic = topicData?.topics?.find(t => t.id === topicId);
      if (!topic) {
        document.getElementById('topicTitle').textContent = `Topic ${topicId} not found`;
        return;
      }

      // Header
      document.getElementById('topicTitle').textContent = topic.title;
      document.getElementById('topicMeta').innerHTML =
        `<span class="topic-id">${topic.id}</span> · ${statusBadge(topic.status)} · ${topic.created || ''}`;
      document.title = `${topic.title} — Legend Team`;

      // Reports tab
      const reportsEl = document.getElementById('tab-reports');
      if (topic.reportFiles && topic.reportFiles.length > 0) {
        // Determine the folder path for reports — use reportPath (publish contract)
        let folderBase = '';
        if (topic.reportPath) {
          folderBase = topic.reportPath.replace(/^reports\//, '').replace(/\/$/, '');
        } else {
          folderBase = `${topic.created}_${topicId}`;
        }

        const items = topic.reportFiles.map(f => `
          <div class="report-item" id="report-${f}">
            <div class="report-header" onclick="toggleReport('${folderBase}/${f}', '${f}')">
              <span class="report-icon">&#x1F4C4;</span>
              <span class="report-name">${f}</span>
              <span class="report-toggle" id="toggle-${f}">&#x25B6;</span>
            </div>
            <div class="report-body" id="body-${f}"></div>
          </div>
        `).join('');
        reportsEl.innerHTML = `<div class="report-list">${items}</div>`;
      } else {
        reportsEl.innerHTML = '<div class="empty-state">No reports available</div>';
      }

      // Decisions tab — filter by topic
      const decData = await DataLoader.getDecisionLedger();
      const decEl = document.getElementById('tab-decisions');
      if (decData && decData.decisions) {
        const topicSlug = topic.id;
        const topicDecs = decData.decisions.filter(d =>
          d.topic === topicSlug ||
          d.topic === topic.title ||
          d.session === topic.id ||
          (topic.masterDecisions && topic.masterDecisions.includes(d.id))
        );
        if (topicDecs.length > 0) {
          decEl.innerHTML = topicDecs.map(d => `
            <div class="decision-item">
              <div class="decision-id">${d.id}</div>
              <div class="decision-axis">${d.axis}</div>
              <div class="decision-value">${d.value}</div>
              <div class="decision-meta">
                <span>${d.date}</span>
                <span>${d.decision}</span>
                <span>${d.status}</span>
              </div>
            </div>
          `).join('');
        } else {
          decEl.innerHTML = '<div class="empty-state">No decisions for this topic</div>';
        }
      }

      // Feedback tab
      const fbData = await DataLoader.getMasterFeedback();
      const fbEl = document.getElementById('tab-feedback');
      if (fbData && fbData.feedbackLog) {
        const topicFb = fbData.feedbackLog.filter(f =>
          f.topic?.includes(topic.title?.substring(0, 10)) ||
          f.topic?.includes(topicId) ||
          f.session === topic.id
        );
        if (topicFb.length > 0) {
          fbEl.innerHTML = topicFb.map(f => `
            <div class="feedback-item">
              <div class="feedback-id">${f.id}</div>
              <div class="feedback-text">${f.feedback}</div>
              <div class="feedback-meta">${f.date} · ${f.session} · ${f.instruction || ''}</div>
            </div>
          `).join('');
        } else {
          fbEl.innerHTML = '<div class="empty-state">No feedback for this topic</div>';
        }
      }
    }

    const _loadedReports = {};
    async function toggleReport(path, filename) {
      const body = document.getElementById('body-' + filename);
      const toggle = document.getElementById('toggle-' + filename);
      if (body.classList.contains('open')) {
        body.classList.remove('open');
        toggle.classList.remove('open');
        return;
      }
      // Load if not cached
      if (!_loadedReports[path]) {
        body.innerHTML = '<div class="loading">Loading report</div>';
        body.classList.add('open');
        toggle.classList.add('open');
        const md = await DataLoader.getReport(path);
        if (md) {
          _loadedReports[path] = mdToHtml(md);
        } else {
          _loadedReports[path] = '<div class="empty-state">Could not load report</div>';
        }
      }
      body.innerHTML = `<div class="md-content">${_loadedReports[path]}</div>`;
      body.classList.add('open');
      toggle.classList.add('open');
    }

    init();
  </script>
</body>
</html>
