<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>과제 운영 뷰 — Legend Team</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .command-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .command-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px 16px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .command-label { font-size: 11px; color: var(--text-secondary); }
    .command-value { font-size: 22px; font-weight: 700; color: var(--text); }
    .command-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-top: 4px;
      width: fit-content;
    }
    .badge-alarm { background: #2a0a0a; color: var(--accent-red); border: 1px solid #5a1a1a; }
    .badge-ok { background: #0a2a0a; color: var(--accent-green); border: 1px solid #1a5a1a; }
    .badge-warn { background: #2a2000; color: var(--accent-gold); border: 1px solid #5a4000; }

    .pipeline-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
    .pipeline-item {
      display: grid; grid-template-columns: 80px 1fr auto auto;
      align-items: center; gap: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 16px; font-size: 12px;
    }
    .pipeline-type {
      font-size: 10px; color: var(--text-secondary);
      background: var(--surface-2); border-radius: 4px; padding: 2px 6px; text-align: center;
    }
    .pipeline-title { color: var(--text); font-weight: 500; }
    .pipeline-status { font-size: 10px; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
    .status-in-progress { background: var(--status-progress-bg); color: var(--status-progress); }
    .status-suspended { background: #1a0a2a; color: #9b59b6; }
    .status-closed { background: var(--status-closed-bg); color: var(--status-closed); }
    .status-completed { background: #0a1a2a; color: #3b6fd4; }
    .pipeline-session { font-size: 10px; color: var(--text-tertiary); white-space: nowrap; }

    .session-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .session-table th {
      text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border);
      font-size: 10px; color: var(--text-secondary); font-weight: 600; letter-spacing: 0.05em;
    }
    .session-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
    .session-table tr:hover td { background: var(--surface-2); }
    .session-table .td-id { color: var(--accent-blue); font-family: monospace; }
    .session-table .td-dec { color: var(--accent-gold); }

    .deferral-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
    .deferral-item {
      display: flex; align-items: flex-start; gap: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px; font-size: 12px;
    }
    .deferral-id { font-family: monospace; font-size: 10px; color: var(--accent-blue); min-width: 48px; }
    .deferral-content { flex: 1; color: var(--text); line-height: 1.5; }
    .deferral-status { font-size: 10px; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
    .status-pending { background: #2a2000; color: var(--accent-gold); }
    .status-resolved { background: #0a2a0a; color: var(--accent-green); }

    .decision-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .decision-table th {
      text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border);
      font-size: 10px; color: var(--text-secondary); font-weight: 600;
    }
    .decision-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
    .decision-table .td-id { font-family: monospace; color: var(--accent-blue); }
    .decision-table .td-axis { color: var(--text-secondary); font-size: 11px; }

    .empty-state { color: var(--text-tertiary); font-style: italic; padding: 16px; font-size: 12px; }
  </style>
</head>
<body>
  <nav class="nav">
    <span class="nav-brand">LEGEND TEAM</span>
    <a href="index.html" class="nav-link">홈</a>
    <a href="dashboard-upgrade.html" class="nav-link">업그레이드 뷰</a>
    <a href="dashboard-ops.html" class="nav-link nav-link-active">과제 운영 뷰</a>
    <a href="decisions.html" class="nav-link">Decisions</a>
    <a href="session.html" class="nav-link">Session</a>
  </nav>

  <div class="page">
    <div class="page-header">
      <div class="page-title">과제 운영 뷰</div>
      <div class="page-sub">지금 뭐가 움직이나 — 파이프라인 · 세션 · 결정 · 이연</div>
    </div>

    <!-- O1: 지휘판 -->
    <div class="section-title" style="margin-bottom:12px">O1 — 지휘판</div>
    <div class="command-grid" id="commandGrid">
      <div class="command-card"><div class="command-label">로딩 중...</div></div>
    </div>

    <!-- O2: 파이프라인 -->
    <div class="section-title" style="margin-bottom:12px">O2 — 파이프라인</div>
    <div class="pipeline-list" id="pipelineList">
      <div class="empty-state">로딩 중...</div>
    </div>

    <!-- O4: 이연 항목 -->
    <div class="section-title" style="margin-bottom:12px">O4 — 이연 항목 (Pending Deferrals)</div>
    <div class="deferral-list" id="deferralList">
      <div class="empty-state">로딩 중...</div>
    </div>

    <!-- O3: 최근 세션 -->
    <div class="section-title" style="margin-bottom:12px">O3 — 최근 세션</div>
    <table class="session-table">
      <thead>
        <tr>
          <th>SESSION</th>
          <th>TOPIC</th>
          <th>시작</th>
          <th>결정</th>
          <th>SIZE</th>
          <th>QUALITY</th>
        </tr>
      </thead>
      <tbody id="sessionTable"></tbody>
    </table>

    <!-- O4: 최근 결정 -->
    <div class="section-title" style="margin-bottom:12px; margin-top:24px">O4 — 최근 결정</div>
    <table class="decision-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>DATE</th>
          <th>AXIS</th>
          <th>STATUS</th>
        </tr>
      </thead>
      <tbody id="decisionTable"></tbody>
    </table>
  </div>

  <script src="js/data-loader.js"></script>
  <script>
    async function init() {
      const [dashData, systemState, topicIndex, decisionLedger] = await Promise.all([
        DataLoader.fetchJSON('memory/shared/dashboard_data.json'),
        DataLoader.fetchJSON('memory/shared/system_state.json'),
        DataLoader.fetchJSON('memory/shared/topic_index.json'),
        DataLoader.fetchJSON('memory/shared/decision_ledger.json'),
      ]);

      renderCommand(dashData, systemState, topicIndex);
      renderPipeline(topicIndex, systemState);
      renderDeferrals(systemState);
      renderSessions(dashData);
      renderDecisions(decisionLedger);
    }

    function renderCommand(dash, sys, topics) {
      const alarms = dash?.alarms ?? [];
      const openTopics = (topics?.topics ?? []).filter(t =>
        t.status === 'in-progress' || t.status === 'suspended'
      );
      const pendingDef = (sys?.pendingDeferrals ?? []).filter(d => d.status === 'pending');
      const totalDec = dash?.metrics?.totalDecisions ?? 0;

      const cards = [
        {
          label: '경보', value: alarms.length,
          badge: alarms.length > 0 ? { text: `${alarms.length}개 활성`, cls: 'badge-alarm' } : { text: '이상 없음', cls: 'badge-ok' }
        },
        {
          label: '오픈 토픽', value: openTopics.length,
          badge: openTopics.length > 0 ? { text: openTopics.map(t => t.id).join(', '), cls: 'badge-warn' } : { text: '없음', cls: 'badge-ok' }
        },
        {
          label: '이연 항목 (pending)', value: pendingDef.length,
          badge: pendingDef.length > 0 ? { text: pendingDef.map(d => d.id).join(', '), cls: 'badge-warn' } : { text: '없음', cls: 'badge-ok' }
        },
        {
          label: '총 결정', value: totalDec,
          badge: { text: `D-001 ~ D-${String(totalDec).padStart(3,'0')}`, cls: 'badge-ok' }
        },
      ];

      document.getElementById('commandGrid').innerHTML = cards.map(c =>
        `<div class="command-card">
          <div class="command-label">${c.label}</div>
          <div class="command-value">${c.value}</div>
          ${c.badge ? `<span class="command-badge ${c.badge.cls}">${c.badge.text}</span>` : ''}
        </div>`
      ).join('');
    }

    function statusClass(status) {
      if (status === 'in-progress') return 'status-in-progress';
      if (status === 'suspended') return 'status-suspended';
      if (status === 'completed') return 'status-completed';
      return 'status-closed';
    }

    function renderPipeline(topicIndex, sys) {
      const topics = topicIndex?.topics ?? [];
      const active = topics.filter(t =>
        t.status === 'in-progress' || t.status === 'suspended'
      );
      const recent = topics.filter(t =>
        t.status === 'completed' || t.status === 'closed'
      ).slice(-5).reverse();

      const items = [...active, ...recent].slice(0, 10);
      if (items.length === 0) {
        document.getElementById('pipelineList').innerHTML = '<div class="empty-state">항목 없음</div>';
        return;
      }

      document.getElementById('pipelineList').innerHTML = items.map(t =>
        `<div class="pipeline-item">
          <span class="pipeline-type">${t.type ?? 'general'}</span>
          <span class="pipeline-title">${t.title}</span>
          <span class="pipeline-status ${statusClass(t.status)}">${t.status}</span>
          <span class="pipeline-session">${t.note?.match(/session_\d+/)?.[0] ?? t.id}</span>
        </div>`
      ).join('');
    }

    function renderDeferrals(sys) {
      const deferrals = sys?.pendingDeferrals ?? [];
      if (deferrals.length === 0) {
        document.getElementById('deferralList').innerHTML = '<div class="empty-state">이연 항목 없음</div>';
        return;
      }
      document.getElementById('deferralList').innerHTML = deferrals.map(d =>
        `<div class="deferral-item">
          <span class="deferral-id">${d.id}</span>
          <div class="deferral-content">
            <div>${d.item}</div>
            ${d.note ? `<div style="color:var(--text-tertiary);margin-top:4px;font-size:11px">${d.note}</div>` : ''}
          </div>
          <span class="deferral-status status-${d.status}">${d.status}</span>
        </div>`
      ).join('');
    }

    function renderSessions(dash) {
      const sessions = (dash?.sessions ?? []).slice().reverse().slice(0, 15);
      const tbody = document.getElementById('sessionTable');
      if (sessions.length === 0) { tbody.innerHTML = '<tr><td colspan="6" class="empty-state">데이터 없음</td></tr>'; return; }

      tbody.innerHTML = sessions.map(s =>
        `<tr>
          <td class="td-id">${s.sessionId}</td>
          <td>${s.topic ?? s.topicSlug}</td>
          <td style="color:var(--text-tertiary)">${s.startedAt.slice(0,10)}</td>
          <td class="td-dec">${s.decisionCount > 0 ? '+' + s.decisionCount : '—'}</td>
          <td>${s.size}</td>
          <td style="color:${s.dataQuality === 'auto' ? 'var(--accent-blue)' : 'var(--text-tertiary)'}">${s.dataQuality}</td>
        </tr>`
      ).join('');
    }

    function renderDecisions(ledger) {
      const decisions = (ledger?.decisions ?? []).slice().reverse().slice(0, 10);
      const tbody = document.getElementById('decisionTable');
      if (decisions.length === 0) { tbody.innerHTML = '<tr><td colspan="4" class="empty-state">데이터 없음</td></tr>'; return; }

      tbody.innerHTML = decisions.map(d =>
        `<tr>
          <td class="td-id">${d.id}</td>
          <td style="color:var(--text-tertiary)">${d.date}</td>
          <td class="td-axis">${d.axis}</td>
          <td><span style="font-size:10px;color:var(--accent-green)">${d.status}</span></td>
        </tr>`
      ).join('');
    }

    init();
  </script>
</body>
</html>
