<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Gradient Area Chart</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    body { font-family: sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: #1e293b; border-radius: 16px; padding: 36px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); width: 680px; }
    h2 { margin: 0 0 8px; color: #f1f5f9; font-size: 17px; font-weight: 600; }
    p  { margin: 0 0 24px; color: #64748b; font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>월별 방문자 추이 (2026)</h2>
    <p>Unique visitors · 단위: 천명</p>
    <div id="chart" style="width:100%;height:340px;"></div>
  </div>
  <script>
    const chart = echarts.init(document.getElementById('chart'));

    const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    const values = [12, 19, 15, 28, 34, 31, 42, 38, 51, 47, 63, 72];

    chart.setOption({
      tooltip: {
        trigger: 'axis',
        backgroundColor: '#0f172a',
        borderColor: '#334155',
        textStyle: { color: '#f1f5f9' },
        formatter: p => `${p[0].name}<br/><b>${p[0].value}천명</b>`
      },
      grid: { left: 48, right: 24, top: 16, bottom: 36 },
      xAxis: {
        type: 'category',
        data: months,
        axisTick: { show: false },
        axisLine: { lineStyle: { color: '#334155' } },
        axisLabel: { color: '#64748b', fontSize: 12 }
      },
      yAxis: {
        type: 'value',
        axisLabel: { color: '#475569', formatter: v => v + 'k' },
        splitLine: { lineStyle: { color: '#1e3a5f', type: 'dashed' } },
        axisLine: { show: false },
        axisTick: { show: false }
      },
      series: [{
        type: 'line',
        data: values,
        smooth: true,
        symbol: 'circle',
        symbolSize: 7,
        lineStyle: {
          width: 3,
          color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
            { offset: 0, color: '#6366f1' },
            { offset: 1, color: '#38bdf8' }
          ])
        },
        itemStyle: { color: '#38bdf8', borderColor: '#0f172a', borderWidth: 2 },
        areaStyle: {
          color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
            { offset: 0, color: 'rgba(99,102,241,0.45)' },
            { offset: 0.6, color: 'rgba(56,189,248,0.1)' },
            { offset: 1, color: 'rgba(56,189,248,0)' }
          ])
        }
      }]
    });

    window.addEventListener('resize', () => chart.resize());
  </script>
</body>
</html>
