*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:"Pretendard","Segoe UI",-apple-system,sans-serif;overflow:hidden}
body{font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100vh;width:100vw}

/* Top nav */
.topnav{display:flex;align-items:center;gap:24px;padding:10px 24px;background:var(--panel);border-bottom:1px solid var(--line);flex-shrink:0}
.brand{font-weight:700;font-size:15px;letter-spacing:0.02em;color:var(--ink)}
.brand .year{color:var(--accent);margin-right:6px}
.acts{display:flex;gap:4px;flex:1;justify-content:center}
.act{padding:6px 14px;border-radius:999px;font-size:12px;color:var(--ink3);cursor:pointer;transition:all .2s;border:1px solid transparent}
.act.on{color:var(--ink);background:var(--panel2);border-color:var(--line)}
.act:hover{color:var(--ink)}
.meta{font-size:11px;color:var(--ink3);letter-spacing:0.04em}

/* Slide stage */
.stage{flex:1;position:relative;overflow:hidden}
.slide{position:absolute;inset:0;padding:32px 48px 24px;opacity:0;pointer-events:none;transform:translateX(20px);transition:opacity .3s ease, transform .3s ease;display:flex;flex-direction:column}
.slide.active{opacity:1;pointer-events:auto;transform:translateX(0)}
.slide h1{font-size:26px;font-weight:700;margin-bottom:4px;letter-spacing:-0.01em}
.slide h1 .no{color:var(--ink3);font-size:14px;font-weight:500;margin-right:10px;letter-spacing:0}
.slide .sub{color:var(--ink2);font-size:13px;margin-bottom:20px}
.slide .body{flex:1;display:flex;flex-direction:column;gap:16px;min-height:0}

/* Bottom nav */
.btmnav{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;background:var(--panel);border-top:1px solid var(--line);flex-shrink:0}
.dots{display:flex;gap:6px;flex-wrap:wrap}
.dot{width:22px;height:4px;border-radius:2px;background:var(--line);cursor:pointer;transition:all .2s}
.dot:hover{background:var(--ink3)}
.dot.on{background:var(--accent);width:28px}
.pager{display:flex;align-items:center;gap:12px}
.btn{padding:6px 14px;background:var(--panel2);border:1px solid var(--line);border-radius:6px;color:var(--ink2);cursor:pointer;font-size:12px;font-family:inherit}
.btn:hover{color:var(--ink);border-color:var(--accent)}
.idx{font-size:12px;color:var(--ink3);min-width:48px;text-align:center}

/* Cover */
.cover{justify-content:center;align-items:center;text-align:center}
.cover .big{font-size:72px;font-weight:800;letter-spacing:-0.03em;background:linear-gradient(135deg,#5B8DEF,#9B7EDE 60%,#4ECDC4);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:16px}
.cover .tag{color:var(--ink2);font-size:16px;margin-bottom:48px}
.cover .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;width:100%;max-width:1000px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:20px;text-align:left}
.kpi .l{font-size:11px;color:var(--ink3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px}
.kpi .v{font-size:28px;font-weight:700;color:var(--ink)}
.kpi .u{font-size:14px;color:var(--ink2);margin-left:4px;font-weight:500}
.kpi .d{font-size:11px;color:var(--ink3);margin-top:4px}
.kpi.acc .v{color:var(--accent)}
.kpi.ok .v{color:var(--ok)}
.kpi.warn .v{color:var(--warn)}

/* Grids */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;flex:1;min-height:0}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;flex:1;min-height:0}
.grid-2x2{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:16px;flex:1;min-height:0}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.card .h{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.card .hsub{font-size:11px;color:var(--ink3);margin-bottom:10px}
.card .chart{flex:1;min-height:0}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:0.04em}
.badge.bad{background:rgba(231,76,60,0.15);color:var(--bad)}
.badge.ok{background:rgba(78,205,196,0.15);color:var(--ok)}
.badge.warn{background:rgba(245,166,35,0.15);color:var(--warn)}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;color:var(--ink3);font-weight:500;font-size:11px;letter-spacing:0.04em;border-bottom:1px solid var(--line);text-transform:uppercase;background:var(--panel2)}
td{padding:7px 10px;border-bottom:1px solid rgba(38,48,67,0.6);color:var(--ink)}
tr:hover td{background:rgba(91,141,239,0.05)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.pbar{display:inline-block;width:80px;height:6px;background:var(--panel2);border-radius:3px;vertical-align:middle;margin-left:8px;overflow:hidden}
.pbar>span{display:block;height:100%;background:var(--accent);border-radius:3px}
.scroll{overflow-y:auto;max-height:100%}
.scroll::-webkit-scrollbar{width:6px}
.scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}

/* Insight boxes */
.insights{background:var(--panel2);border-left:3px solid var(--accent);border-radius:4px;padding:12px 16px;font-size:12.5px;line-height:1.7;color:var(--ink2)}
.insights strong{color:var(--ink)}
.insights ul{margin:0;padding-left:18px}
.insights li{margin-bottom:4px}
.insights.warn{border-left-color:var(--warn)}
.insights.bad{border-left-color:var(--bad)}

/* Action cards */
.actgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;flex:1;min-height:0}
.actcard{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px;display:flex;flex-direction:column;position:relative;overflow:hidden}
.actcard .rank{position:absolute;top:10px;right:14px;font-size:48px;font-weight:800;color:var(--line);line-height:1}
.actcard .tt{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:4px;z-index:1;position:relative}
.actcard .eff{font-size:22px;color:var(--ok);font-weight:700;margin:8px 0;z-index:1;position:relative}
.actcard .desc{font-size:11.5px;color:var(--ink2);line-height:1.6;z-index:1;position:relative;flex:1}
.actcard .tag{display:inline-flex;gap:6px;margin-top:10px;z-index:1;position:relative}
.actcard .tag span{font-size:10px;padding:2px 8px;background:var(--panel2);border-radius:4px;color:var(--ink3)}

/* Footer note */
.note{position:absolute;bottom:8px;right:48px;font-size:10px;color:var(--ink3);font-style:italic}
.warning-banner{background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.3);color:var(--warn);padding:8px 14px;border-radius:6px;font-size:11.5px;margin-bottom:12px}

.act-act { font-size: 10px; color: var(--ink3); margin-right: 4px; }

/* ============ Render & Navigation ============ */
const stage = document.getElementById("stage");
const dotsWrap = document.getElementById("dots");
const actsWrap = document.getElementById("acts");
const idxEl = document.getElementById("idx");
let cur = 0;

// Build slide DOM
slides.forEach((s,i)=>{
  const el = document.createElement("div");
  el.className = "slide";
  el.id = "slide_"+i;
  if(s.id!=="cover"){
    el.innerHTML = `<h1><span class="no">${String(i+1).padStart(2,"0")}</span>${s.title}</h1><div class="sub">${s.sub||""}</div><div class="body"></div>`;
  }
  stage.appendChild(el);
  const dot = document.createElement("div");
  dot.className="dot"; dot.title = s.title||s.id;
  dot.onclick = ()=>go(i);
  dotsWrap.appendChild(dot);
});

// Build section acts
sections.forEach((sec, si)=>{
  const a = document.createElement("div");
  a.className = "act";
  a.innerHTML = `<span class="act-act">${String(si+1).padStart(2,"0")}</span>${sec.act}`;
  a.onclick = ()=>go(sec.slides[0]);
  a.dataset.slides = sec.slides.join(",");
  actsWrap.appendChild(a);
});

const renderedSet = new Set();
function go(i){
  if(i<0||i>=slides.length) return;
  cur = i;
  document.querySelectorAll(".slide").forEach((el,idx)=>el.classList.toggle("active", idx===i));
  document.querySelectorAll(".dot").forEach((el,idx)=>el.classList.toggle("on", idx===i));
  document.querySelectorAll(".act").forEach(a=>{
    const ss = a.dataset.slides.split(",").map(Number);
    a.classList.toggle("on", ss.includes(i));
  });
  idxEl.textContent = (i+1)+" / "+slides.length;
  if(!renderedSet.has(i)){
    slides[i].render(document.getElementById("slide_"+i));
    renderedSet.add(i);
  }
  // resize all charts in active slide (fixes 0-width init)
  setTimeout(()=>{
    document.querySelectorAll("#slide_"+i+" .chart").forEach(c=>{
      const inst = echarts.getInstanceByDom(c);
      if(inst) inst.resize();
    });
  }, 50);
}
document.getElementById("prev").onclick = ()=>go(cur-1);
document.getElementById("next").onclick = ()=>go(cur+1);
document.addEventListener("keydown", e=>{
  if(e.key==="ArrowRight"||e.key===" "||e.key==="PageDown") { e.preventDefault(); go(cur+1); }
  else if(e.key==="ArrowLeft"||e.key==="PageUp") { e.preventDefault(); go(cur-1); }
  else if(e.key==="Home") go(0);
  else if(e.key==="End") go(slides.length-1);
  else if(/^[0-9]$/.test(e.key)) {
    const n = parseInt(e.key);
    const sec = sections[n-1]; if(sec) go(sec.slides[0]);
  }
});
window.addEventListener("resize", ()=>{
  document.querySelectorAll("#slide_"+cur+" .chart").forEach(c=>{
    const inst = echarts.getInstanceByDom(c);
    if(inst) inst.resize();
  });
});
go(0);
</script>
